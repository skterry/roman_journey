// Roman Wide Field Instrument focal-plane array (18 H4RG detectors): six columns
// of three glassy blue/teal chips on a grey frame and gold baseplate. The columns
// are staggered vertically — the centre pair sits highest, stepping down to the
// outer columns, which are also set slightly apart — giving the array its stepped
// "space-invader" silhouette. (Replaces the old Rocky sprite.) Drawn centred at
// (cx,cy) with a single offset drop shadow so it reads as one solid object.
const FP_TINTS = [
  '#2f86a4','#2b6f9e','#327e86',   // col 1
  '#2d79a6','#3a8aa0','#2e8f8a',   // col 2
  '#3590a2','#2a6fa2','#246b8e',   // col 3
  '#2f7ca2','#3d9094','#2b7390',   // col 4
  '#2e87a0','#357f7a','#2c72a4',   // col 5
  '#2f8087','#2a6f93','#3686a0',   // col 6
];
const FP_COL_DY = [1.0, 0.45, 0.0, 0.0, 0.45, 1.0];  // per-column drop (pitch units)

function drawFocalPlane(cx, cy) {
  const W = FP_W, Ht = FP_H, hw = W / 2, hh = Ht / 2;
  const cols = 6, rows = 3;
  const gapR = 0.16;                              // uniform chip gap across all columns
  const maxDY = Math.max(...FP_COL_DY);
  const goldM = 3.4, greyM = 2.1;                 // gold / grey frame margins beyond the chips

  // Chip sizing — fit the staggered array (plus frame margin) inside the model box.
  const chip = Math.min(
    (W  - 2 * goldM) / (cols + (cols - 1) * gapR),
    (Ht - 2 * goldM) / ((rows + maxDY) + gapR * (rows - 1 + maxDY))
  );
  const gap = chip * gapR, pitch = chip + gap;
  const colH   = rows * chip + (rows - 1) * gap;
  const arrayW = cols * chip + (cols - 1) * gap;
  const arrayH = colH + maxDY * pitch;
  const ax0 = -arrayW / 2, ayTop = -arrayH / 2;

  // Per-column chip rectangle (top-left + size)
  const colX   = c => ax0 + c * pitch;
  const colTop = c => ayTop + FP_COL_DY[c] * pitch;

  // A path tracing the array silhouette: the union of all six column rectangles,
  // each grown by margin m. Because neighbouring columns overlap once grown, the
  // union forms one continuous stepped outline that hugs the 18-chip layout.
  function silhouette(m, r) {
    ctx.beginPath();
    for (let c = 0; c < cols; c++) {
      ctx.roundRect(colX(c) - m, colTop(c) - m, chip + 2 * m, colH + 2 * m, r);
    }
  }

  ctx.save();
  ctx.translate(cx, cy);

  // Gold frame following the array outline — carries the single drop shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.30)';
  ctx.shadowBlur = 9; ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 5;
  const gold = ctx.createLinearGradient(-hw, -hh, hw, hh);
  gold.addColorStop(0, '#e6c477'); gold.addColorStop(0.5, '#c69f4e'); gold.addColorStop(1, '#9a7733');
  ctx.fillStyle = gold;
  silhouette(goldM, 3); ctx.fill();
  ctx.restore();

  // Grey metal frame just inside the gold edge (same stepped outline)
  const grey = ctx.createLinearGradient(-hw, -hh, hw, hh);
  grey.addColorStop(0, '#c0c6ce'); grey.addColorStop(0.5, '#8b9099'); grey.addColorStop(1, '#666c75');
  ctx.fillStyle = grey;
  silhouette(greyM, 2.4); ctx.fill();

  // Detector chips
  for (let c = 0; c < cols; c++) {
    const x = colX(c), cTop = colTop(c);
    for (let r = 0; r < rows; r++) {
      const y = cTop + r * pitch;
      // Dark backing → reads as black grout between chips
      ctx.fillStyle = '#10151a';
      ctx.fillRect(x - gap * 0.55, y - gap * 0.55, chip + gap * 1.1, chip + gap * 1.1);
      // Detector chip
      ctx.fillStyle = FP_TINTS[c * rows + r];
      ctx.fillRect(x, y, chip, chip);
      // Top sheen fading to a shaded base
      const sg = ctx.createLinearGradient(x, y, x, y + chip);
      sg.addColorStop(0,    'rgba(255,255,255,0.34)');
      sg.addColorStop(0.45, 'rgba(255,255,255,0.05)');
      sg.addColorStop(1,    'rgba(0,0,0,0.22)');
      ctx.fillStyle = sg; ctx.fillRect(x, y, chip, chip);
      // Diagonal glare streak (glassy reflection)
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.moveTo(x, y + chip * 0.6); ctx.lineTo(x + chip * 0.5, y);
      ctx.lineTo(x + chip * 0.78, y); ctx.lineTo(x, y + chip * 0.95);
      ctx.closePath(); ctx.fill();
      // Chip bezel
      ctx.strokeStyle = 'rgba(8,12,16,0.5)'; ctx.lineWidth = 0.5;
      ctx.strokeRect(x + 0.25, y + 0.25, chip - 0.5, chip - 0.5);
    }
  }

  ctx.restore();
}

// Framed portrait of Nancy Grace Roman, hung on a chamber wall: the photo inside a
// thin wooden frame with a soft offset shadow so it reads as mounted to the wall.
const NANCY_ASPECT = 567 / 484;   // portrait source is landscape (w / h)
function drawNancyPortrait(cx, cy) {
  const imgH = 58, imgW = imgH * NANCY_ASPECT;   // ≈ 68 × 58 landscape photo
  const fb = 5;                                   // thin wooden frame border
  const ox = cx - imgW / 2, oy = cy - imgH / 2;

  // Wooden frame (carries the mounting drop shadow)
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.32)';
  ctx.shadowBlur = 8; ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 5;
  const wood = ctx.createLinearGradient(ox - fb, oy - fb, ox - fb, oy + imgH + fb);
  wood.addColorStop(0, '#8a5a2e'); wood.addColorStop(0.5, '#6b4423'); wood.addColorStop(1, '#4f3119');
  ctx.fillStyle = wood;
  ctx.fillRect(ox - fb, oy - fb, imgW + 2 * fb, imgH + 2 * fb);
  ctx.restore();

  // Frame bevels — dark outer edge, light inner lip
  ctx.strokeStyle = 'rgba(40,24,10,0.75)'; ctx.lineWidth = 1;
  ctx.strokeRect(ox - fb + 0.5, oy - fb + 0.5, imgW + 2 * fb - 1, imgH + 2 * fb - 1);
  ctx.strokeStyle = 'rgba(190,140,85,0.55)'; ctx.lineWidth = 1;
  ctx.strokeRect(ox - 1.5, oy - 1.5, imgW + 3, imgH + 3);

  // The portrait itself (fallback tile if not yet loaded). High-quality smoothing
  // plus a touch of blur softens the steep downscale (567px → ~68px) so the face
  // reads smooth rather than pixelated.
  if (nancyImg.complete && nancyImg.naturalWidth > 0) {
    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.filter = 'blur(0.6px)';
    ctx.drawImage(nancyImg, ox, oy, imgW, imgH);
    ctx.restore();
  } else {
    ctx.fillStyle = '#37506a'; ctx.fillRect(ox, oy, imgW, imgH);
  }
}

// A cozy bed resting on the chamber floor with someone asleep under a striped
// blanket, facing the headboard (away from the player). cx = bed centre, floorY =
// chamber floor. Head/pillow at the left (tall posts), foot at the right.
function drawBed(cx, floorY) {
  const FRAME = '#6a8fb5', FRAME_D = '#3d5777', FRAME_L = '#a6c2dc';
  const MAT = '#ece8dd', PILLOW = '#f4f0e6', HAIR = '#34313f';
  const BL1 = '#7b6fc4', BL2 = '#b3aae8';
  const x0 = cx - 58, x1 = cx + 58;
  const railY = floorY - 22, railH = 11;
  const matTop = floorY - 40;

  ctx.save();

  // Back-wall drop shadow (same offset convention as the desk / portrait / focal plane).
  // A coarse silhouette of the bed mass — the real bedding drawn on top hides it, so only
  // the soft offset blur reads as a shadow cast on the chamber's back wall.
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.28)';
  ctx.shadowBlur = 12; ctx.shadowOffsetX = 7; ctx.shadowOffsetY = 6;
  ctx.fillStyle = '#2a2f3a';
  ctx.beginPath(); ctx.roundRect(x0 - 4, matTop - 30, (x1 - x0) + 8, floorY - (matTop - 30), 10); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x0 - 6, floorY - 78, 12, 78, 6); ctx.fill();
  ctx.restore();

  // Floor shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(cx, floorY + 3, 66, 8, 0, 0, Math.PI * 2); ctx.fill();

  // Corner posts (behind the bedding) — tall at the head, short at the foot
  function post(px, topY, w) {
    ctx.fillStyle = FRAME;
    ctx.beginPath(); ctx.roundRect(px - w / 2, topY, w, floorY - topY, w / 2); ctx.fill();
    ctx.strokeStyle = FRAME_D; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = FRAME_L;
    ctx.beginPath(); ctx.arc(px, topY, w * 0.85, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = FRAME_D; ctx.stroke();
  }
  post(x0, floorY - 72, 8);   // head post (tall)
  post(x1, floorY - 50, 8);   // foot post (short)

  // Side rail
  ctx.fillStyle = FRAME;
  ctx.beginPath(); ctx.roundRect(x0, railY, x1 - x0, railH, 3); ctx.fill();
  ctx.strokeStyle = FRAME_D; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.20)'; ctx.fillRect(x0 + 3, railY + 1.5, x1 - x0 - 6, 2);

  // Mattress
  ctx.fillStyle = MAT;
  ctx.beginPath(); ctx.roundRect(x0 + 3, matTop, (x1 - x0) - 6, (railY - matTop) + 3, 4); ctx.fill();
  ctx.strokeStyle = '#cbc5b6'; ctx.lineWidth = 1; ctx.stroke();

  // Pillow (head end)
  ctx.fillStyle = PILLOW;
  ctx.beginPath(); ctx.roundRect(x0 + 6, matTop - 9, 34, 15, 7); ctx.fill();
  ctx.strokeStyle = '#dad4c6'; ctx.lineWidth = 1; ctx.stroke();

  // Sleeper's head resting on the pillow (back of the head, facing the headboard).
  // Hair grows from a crown and sweeps down toward the nape, with a sliver of neck
  // showing where it meets the pillow — so it reads as hair on a head, not a helmet.
  const hx = x0 + 26, hy = matTop - 5, hr = 11;
  const HAIR_D = '#211f2b', HAIR_L = '#54506c';
  // Hair mass — gently oval
  ctx.fillStyle = HAIR;
  ctx.beginPath(); ctx.ellipse(hx, hy, hr, hr * 1.04, 0, 0, Math.PI * 2); ctx.fill();
  // Crown sits up-and-left; strands sweep outward following the curve of the head
  const cxn = hx - 4, cyn = hy - 5;
  ctx.lineCap = 'round';
  ctx.strokeStyle = HAIR_D; ctx.lineWidth = 1;
  for (let k = 0; k < 8; k++) {
    const a = -2.4 + k * 0.62;
    ctx.beginPath();
    ctx.moveTo(cxn, cyn);
    ctx.quadraticCurveTo(cxn + Math.cos(a) * hr * 0.5, cyn + Math.sin(a) * hr * 0.7,
                         hx + Math.cos(a) * hr * 1.02, hy + Math.sin(a) * hr * 1.05);
    ctx.stroke();
  }
  // Lighter highlight strands catching light near the crown
  ctx.strokeStyle = HAIR_L; ctx.lineWidth = 0.8;
  for (let k = 0; k < 3; k++) {
    const a = -1.7 + k * 0.5;
    ctx.beginPath();
    ctx.moveTo(cxn, cyn);
    ctx.quadraticCurveTo(cxn + Math.cos(a) * 4, cyn + Math.sin(a) * 4,
                         hx + Math.cos(a) * hr * 0.8, hy + Math.sin(a) * hr * 0.82);
    ctx.stroke();
  }
  // Crown swirl point
  ctx.fillStyle = HAIR_D; ctx.beginPath(); ctx.arc(cxn, cyn, 1, 0, Math.PI * 2); ctx.fill();
  // A sliver of skin at the nape (lower-right), then a ragged hair tip over it
  ctx.fillStyle = '#caa07e';
  ctx.beginPath(); ctx.ellipse(hx + hr * 0.5, hy + hr * 0.78, 3.2, 2.3, -0.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = HAIR;
  ctx.beginPath(); ctx.arc(hx + hr * 0.38, hy + hr * 0.66, 2.6, 0, Math.PI * 2); ctx.fill();

  // Striped blanket mounded over the body (neck → foot)
  const bx0 = x0 + 32, bx1 = x1 - 4;
  function blanketTop() {
    ctx.beginPath();
    ctx.moveTo(bx0, matTop + 2);
    ctx.quadraticCurveTo(bx0 + 6, matTop - 18, cx + 6, matTop - 20);
    ctx.quadraticCurveTo(bx1 - 6, matTop - 22, bx1, matTop - 2);
  }
  ctx.save();
  blanketTop(); ctx.lineTo(bx1, railY + 2); ctx.lineTo(bx0, railY + 2); ctx.closePath(); ctx.clip();
  const sw = 12;
  for (let sx = bx0 - 4, i = 0; sx < bx1 + sw; sx += sw, i++) {
    ctx.fillStyle = i % 2 ? BL1 : BL2;
    ctx.fillRect(sx, matTop - 32, sw, 64);
  }
  ctx.restore();
  // Blanket top edge + a sheet fold near the neck
  ctx.strokeStyle = '#574d9c'; ctx.lineWidth = 1.3; blanketTop(); ctx.stroke();
  ctx.strokeStyle = '#dcd6f4'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(bx0, matTop - 1); ctx.quadraticCurveTo(bx0 + 6, matTop - 13, bx0 + 15, matTop - 14); ctx.stroke();

  // Zzz drifting up from the head
  ctx.fillStyle = 'rgba(175,210,255,0.9)'; ctx.textAlign = 'center';
  ctx.font = '800 11px "Segoe UI", Arial'; ctx.fillText('z', x0 + 42, matTop - 24);
  ctx.font = '800 14px "Segoe UI", Arial'; ctx.fillText('z', x0 + 53, matTop - 36);
  ctx.font = '800 18px "Segoe UI", Arial'; ctx.fillText('Z', x0 + 66, matTop - 50);

  ctx.restore();
}

// Returns {cy, gapH} of the tunnel opening at a given x-offset along the structure.
function getTunnelShape(d, xOff) {
  const kf = d.keyframes;
  const xc = Math.max(0, Math.min(xOff, kf[kf.length - 1].x));
  let i = 0;
  while (i < kf.length - 2 && kf[i + 1].x <= xc) i++;
  const a = kf[i], b = kf[i + 1];
  const t = (xc - a.x) / Math.max(1, b.x - a.x);
  const s = t * t * (3 - 2 * t);
  return {
    cy:   a.cy   + (b.cy   - a.cy)   * s,
    gapH: a.gapH + (b.gapH - a.gapH) * s,
  };
}

// Animated airlock hatch at an external tunnel interface (the open-space ↔ structure
// boundary only — never the internal zone doorways). Two panels slide apart as the
// telescope nears and seal again once it has passed. The opening is driven purely by
// the craft's horizontal distance to the doorway, so the hatch is always fully open
// while the craft is alongside it — quick enough to fly through without ever touching.
function drawTunnelDoor(d, xOff, doorX) {
  if (doorX < -12 || doorX > W + 12) return;
  const sh   = getTunnelShape(d, xOff);
  const topY = sh.cy - sh.gapH / 2;
  const botY = sh.cy + sh.gapH / 2;

  const OPEN_DIST = 120, ANIM = 90;   // fully open within 120px; gradual 90px ramp
  const o = Math.max(0, Math.min(1, (OPEN_DIST + ANIM - Math.abs(doorX - CRAFT_X)) / ANIM));
  if (o >= 0.999) return;             // fully retracted → nothing to draw

  const DW   = 16;                    // door slab thickness
  const dx0  = doorX - DW / 2;
  const half = sh.gapH / 2;
  const topPanelBot = sh.cy - o * half;  // top panel hangs from ceiling, grows as o→0
  const botPanelTop = sh.cy + o * half;  // bottom panel rises from floor

  function panel(yA, yB, leadEdge, leadDir) {
    const h = yB - yA;
    if (h <= 0.5) return;
    const g = ctx.createLinearGradient(dx0, 0, dx0 + DW, 0);
    g.addColorStop(0, '#2c3346'); g.addColorStop(0.5, '#5a6478'); g.addColorStop(1, '#2c3346');
    ctx.fillStyle = g; ctx.fillRect(dx0, yA, DW, h);
    ctx.strokeStyle = '#161c2b'; ctx.lineWidth = 1.5; ctx.strokeRect(dx0, yA, DW, h);
    // Hazard stripe on the leading edge (the face that meets the gap centre)
    const bandH = 5, by = leadDir > 0 ? leadEdge - bandH : leadEdge;
    for (let i = 0; i < DW; i += 6) {
      ctx.fillStyle = ((i / 6) | 0) % 2 ? '#14142a' : '#f5c518';
      ctx.fillRect(dx0 + i, by, Math.min(6, DW - i), bandH);
    }
  }
  panel(topY, topPanelBot, topPanelBot, +1);
  panel(botPanelTop, botY, botPanelTop, -1);
}

let _tunnelBgGrad = null, _tunnelIntGrad = null;  // constant gradients, built once
function drawTunnel(d) {
  const x0   = Math.max(0, d.x);
  const x1   = Math.min(W, d.x + d.length);
  if (x1 <= x0) return;

  // Build vertex arrays for the walls. The sample grid is anchored in STRUCTURE
  // space (xOff), not screen space, so the vertices don't drift as the structure
  // scrolls — that drift was what made the sharp threshold walls flicker. Every
  // keyframe boundary is also added as a paired vertex (one just before, one at)
  // so each vertical wall lands exactly on a vertex and stays crisp every frame.
  const step = 4;
  const oStart = Math.max(0, x0 - d.x);          // visible xOff range
  const oEnd   = Math.min(d.length, x1 - d.x);
  const offSet = new Set([oStart, oEnd]);
  for (let o = Math.ceil(oStart / step) * step; o < oEnd; o += step) offSet.add(o);
  for (const kf of d.keyframes) {
    if (kf.x > oStart && kf.x < oEnd) { offSet.add(kf.x - 0.01); offSet.add(kf.x); }
  }
  const offs = Array.from(offSet).sort((a, b) => a - b);

  const xs = [], topYs = [], botYs = [];
  for (const o of offs) {
    const sh = getTunnelShape(d, o);
    xs.push(d.x + o);
    topYs.push(sh.cy - sh.gapH / 2);
    botYs.push(sh.cy + sh.gapH / 2);
  }
  const n = xs.length;

  // ── Wall fill ──
  if (!_tunnelBgGrad) {
    _tunnelBgGrad = ctx.createLinearGradient(0, 0, 0, H);
    _tunnelBgGrad.addColorStop(0, '#13132a'); _tunnelBgGrad.addColorStop(1, '#1e1e38');
  }
  const bg = _tunnelBgGrad;
  ctx.fillStyle = bg;

  ctx.beginPath(); // top wall polygon
  ctx.moveTo(xs[0], 0);
  for (let i = 0; i < n; i++) ctx.lineTo(xs[i], topYs[i]);
  ctx.lineTo(xs[n-1], 0);
  ctx.closePath(); ctx.fill();

  ctx.beginPath(); // bottom wall polygon
  ctx.moveTo(xs[0], H - GROUND_H);
  for (let i = 0; i < n; i++) ctx.lineTo(xs[i], botYs[i]);
  ctx.lineTo(xs[n-1], H - GROUND_H);
  ctx.closePath(); ctx.fill();

  // ── Interior corridor fill + scroll indicators ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(xs[0], topYs[0]);
  for (let i = 1; i < n; i++) ctx.lineTo(xs[i], topYs[i]);
  for (let i = n - 1; i >= 0; i--) ctx.lineTo(xs[i], botYs[i]);
  ctx.closePath();
  ctx.clip();

  if (!_tunnelIntGrad) {
    _tunnelIntGrad = ctx.createLinearGradient(0, 0, 0, H);
    _tunnelIntGrad.addColorStop(0,   '#70798c');
    _tunnelIntGrad.addColorStop(0.5, '#a0a8b5');
    _tunnelIntGrad.addColorStop(1,   '#70798c');
  }
  ctx.fillStyle = _tunnelIntGrad;
  ctx.fillRect(x0, 0, x1 - x0, H);

  // Horizontal hull-plate seams (fixed Y — give the corridor texture and depth)
  const hRibSpacing = 32;
  ctx.strokeStyle = 'rgba(60,70,90,0.22)';
  ctx.lineWidth = 1;
  for (let ry = 0; ry < H; ry += hRibSpacing) {
    ctx.beginPath(); ctx.moveTo(x0, ry); ctx.lineTo(x1, ry); ctx.stroke();
  }

  // Vertical rivet ticks aligned to world-X — these scroll left, making motion obvious
  const tickSpacingInt = 64;
  const tick0Int = x0 - ((x0 - d.x) % tickSpacingInt);
  ctx.strokeStyle = 'rgba(60,70,90,0.45)';
  ctx.lineWidth = 1.5;
  for (let tx = tick0Int; tx <= x1; tx += tickSpacingInt) {
    for (let ry = 0; ry < H; ry += hRibSpacing) {
      ctx.beginPath(); ctx.moveTo(tx, ry - 5); ctx.lineTo(tx, ry + 5); ctx.stroke();
    }
  }

  ctx.restore();

  // ── Vertical panel seams ──
  ctx.strokeStyle = 'rgba(70,80,140,0.35)'; ctx.lineWidth = 1;
  const panW  = 64;
  const seam0 = x0 - ((x0 - d.x) % panW);
  for (let px = seam0; px <= x1; px += panW) {
    // Sample the wall edges directly (vertices are no longer uniformly spaced)
    const sh = getTunnelShape(d, px - d.x);
    const segTop = sh.cy - sh.gapH / 2, segBot = sh.cy + sh.gapH / 2;
    ctx.beginPath(); ctx.moveTo(px, 0);      ctx.lineTo(px, segTop); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px, segBot); ctx.lineTo(px, H - GROUND_H); ctx.stroke();
  }

  // ── Inner structural cap (dark band) then blue guide-light strip ──
  ctx.lineJoin = 'round';
  ctx.lineWidth = 9; ctx.strokeStyle = '#2a2a50';
  ctx.beginPath();
  for (let i = 0; i < n; i++) i === 0 ? ctx.moveTo(xs[i], topYs[i]) : ctx.lineTo(xs[i], topYs[i]);
  ctx.stroke();
  ctx.beginPath();
  for (let i = 0; i < n; i++) i === 0 ? ctx.moveTo(xs[i], botYs[i]) : ctx.lineTo(xs[i], botYs[i]);
  ctx.stroke();

  ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(80,180,255,0.90)';
  ctx.beginPath();
  for (let i = 0; i < n; i++) i === 0 ? ctx.moveTo(xs[i], topYs[i]) : ctx.lineTo(xs[i], topYs[i]);
  ctx.stroke();
  ctx.beginPath();
  for (let i = 0; i < n; i++) i === 0 ? ctx.moveTo(xs[i], botYs[i]) : ctx.lineTo(xs[i], botYs[i]);
  ctx.stroke();

  // ── Rectangular windows on the interior grey wall (one per room) ──
  // Room 1 centre: xOff 650  |  Room 2 centre: xOff 2050
  const windowXOffs = [650, 2050];
  const WW = 300, WH = 200; // landscape rectangle (enlarged 150%)
  for (let wi = 0; wi < windowXOffs.length; wi++) {
    const wxOff = windowXOffs[wi];
    const wx = d.x + wxOff;
    if (wx + WW / 2 < x0 || wx - WW / 2 > x1) continue;
    const wsh = getTunnelShape(d, wxOff);
    if (wsh.gapH < 200) continue; // rooms only — skip narrow corridors
    const inTop = (wi % 2 === 0);
    // Place flush against the interior edge of the grey wall
    const wy = inTop
      ? wsh.cy - wsh.gapH / 2 + WH / 2 + 10
      : wsh.cy + wsh.gapH / 2 - WH / 2 - 10;
    const wx0 = wx - WW / 2, wy0 = wy - WH / 2;

    // Glass interior: star-field view + reflective glare, clipped to the pane
    ctx.save();
    ctx.beginPath(); ctx.rect(wx0, wy0, WW, WH); ctx.clip();
    ctx.fillStyle = '#060919'; ctx.fillRect(wx0, wy0, WW, WH);
    for (const s of stars) {
      ctx.globalAlpha = s.layer > 0.4 ? 0.9 : 0.5;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Subtle blue glass tint
    const gt = ctx.createLinearGradient(wx0, wy0, wx0, wy0 + WH);
    gt.addColorStop(0, 'rgba(120,170,230,0.12)');
    gt.addColorStop(1, 'rgba(60,90,150,0.05)');
    ctx.fillStyle = gt; ctx.fillRect(wx0, wy0, WW, WH);
    // Diagonal glare streaks (reflection across the glass)
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.beginPath();
    ctx.moveTo(wx0 + WW * 0.12, wy0);
    ctx.lineTo(wx0 + WW * 0.44, wy0);
    ctx.lineTo(wx0 + WW * 0.04, wy0 + WH);
    ctx.lineTo(wx0 - WW * 0.16, wy0 + WH);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.beginPath();
    ctx.moveTo(wx0 + WW * 0.52, wy0);
    ctx.lineTo(wx0 + WW * 0.63, wy0);
    ctx.lineTo(wx0 + WW * 0.31, wy0 + WH);
    ctx.lineTo(wx0 + WW * 0.20, wy0 + WH);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // Window frame + inner bevel
    ctx.strokeStyle = '#50586a'; ctx.lineWidth = 5;
    ctx.strokeRect(wx0, wy0, WW, WH);
    ctx.strokeStyle = 'rgba(190,200,215,0.55)'; ctx.lineWidth = 2;
    ctx.strokeRect(wx0 + 4, wy0 + 4, WW - 8, WH - 8);
  }

  // ── Framed Nancy portrait mounted on the Room 1 back wall ──
  {
    const pxOff = d.room1.portraitXOff;
    const pAbsX = d.x + pxOff;
    if (pAbsX + 60 >= x0 && pAbsX - 60 <= x1) {
      const psh = getTunnelShape(d, pxOff);
      if (psh.gapH > 200) {                                  // Room 1 only
        const pCY = psh.cy - psh.gapH * 0.16;                // hung upper-middle on the wall
        drawNancyPortrait(pAbsX, pCY);
      }
    }
  }

  // ── Desk & chair (Room 1, randomized position; holds the focal-plane array) ──
  const deskXOff = d.room1.deskXOff;
  const deskAbsX = d.x + deskXOff;
  if (deskAbsX + 90 >= x0 && deskAbsX - 90 <= x1) {
    const dsh    = getTunnelShape(d, deskXOff);
    const floorY = dsh.cy + dsh.gapH / 2;

    // Only draw inside Room 1 (large gap)
    if (dsh.gapH > 200) {
      // Under inverted gravity the furniture is bolted to the ceiling: mirror the
      // floor-built desk & chair vertically about the chamber centreline.
      ctx.save();
      if (d.gravityInverter) { ctx.translate(0, dsh.cy); ctx.scale(1, -1); ctx.translate(0, -dsh.cy); }
      const DS = 1.5;  // desk & chair enlarged 50%
      const deskW = 72 * DS, deskLegH = 24 * DS, deskTopH = 6 * DS;
      const deskTopY = floorY - deskLegH - deskTopH;

      // Chair — simple side profile, facing the desk (backrest on the left)
      const seatW = 26 * DS, seatH = 5 * DS, chairLegH = 17 * DS;
      const seatY = floorY - chairLegH - seatH;
      const backX = deskAbsX - 56 * DS;     // back/left edge of the seat
      const backH = 22 * DS;                // backrest height above the seat

      // Static drop shadow (offset lower-right, softened) behind the furniture masses for depth
      const fsx = 5, fsy = 6;
      ctx.save();
      ctx.filter = 'blur(4px)';
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(backX + fsx, seatY - backH + fsy, seatW, chairLegH + seatH + backH);     // chair mass
      ctx.fillRect(deskAbsX - deskW / 2 + fsx, deskTopY + fsy, deskW, deskLegH + deskTopH);  // desk mass
      ctx.restore();

      // Backrest: single vertical post
      ctx.fillStyle = '#7a4a28';
      ctx.fillRect(backX, seatY - backH, 4 * DS, backH + 5 * DS);   // back post
      // Seat plank
      ctx.fillStyle = '#8b5e3c';
      ctx.fillRect(backX, seatY, seatW, seatH);
      ctx.strokeStyle = '#4a2a10'; ctx.lineWidth = 0.8;
      ctx.strokeRect(backX, seatY, seatW, seatH);
      // Two legs (back and front)
      ctx.fillStyle = '#5c3318';
      ctx.fillRect(backX, seatY + seatH, 4 * DS, chairLegH);
      ctx.fillRect(backX + seatW - 4 * DS, seatY + seatH, 4 * DS, chairLegH);

      // Desk legs
      ctx.fillStyle = '#5c3318';
      ctx.fillRect(deskAbsX - 33 * DS, deskTopY + deskTopH, 5 * DS, deskLegH);
      ctx.fillRect(deskAbsX + 28 * DS, deskTopY + deskTopH, 5 * DS, deskLegH);
      // Desk surface
      ctx.fillStyle = '#a0714a';
      ctx.fillRect(deskAbsX - deskW / 2, deskTopY, deskW, deskTopH);
      ctx.strokeStyle = '#4a2a10'; ctx.lineWidth = 1;
      ctx.strokeRect(deskAbsX - deskW / 2, deskTopY, deskW, deskTopH);
      // Desk edge highlight
      ctx.fillStyle = 'rgba(255,220,170,0.18)';
      ctx.fillRect(deskAbsX - deskW / 2 + 1, deskTopY + 1, deskW - 2, 3);
      // (The focal-plane array rests on this desk — drawn in its own block below.)
      ctx.restore();
    }
  }

  // ── Sleeping-quarters bed on the Room 1 floor (1st structure only) ──
  if (d.structIndex === 1 && d.room1.bedXOff != null) {
    const bedAbsX = d.x + d.room1.bedXOff;
    if (bedAbsX + 70 >= x0 && bedAbsX - 70 <= x1) {
      const bsh = getTunnelShape(d, d.room1.bedXOff);
      if (bsh.gapH > 200) drawBed(bedAbsX, bsh.cy + bsh.gapH / 2);
    }
  }

  // ── Focal-plane array hazard in Room 1: floor-planted in most structures,
  //    drifting/bouncing in the alternating (rockyBounces) ones. The drop shadow
  //    is drawn with the model each frame, so it tracks the array as it moves. ──
  if (!d.laserChamber) {                   // laser chambers hold no focal-plane array
    const r1 = d.room1;
    function blitRocky(absX, absY) {       // absX/absY = model centre
      if (absX + FP_W < x0 || absX - FP_W > x1) return;
      drawFocalPlane(absX, absY);
    }
    if (r1.rockyBounces) {
      // Four solid focal-plane arrays drifting around the chamber.
      for (const rk of r1.rockies) blitRocky(d.x + rk.x, rk.y);
    } else {
      // Single array resting on the wooden desk (where Nancy used to sit).
      const dsh = getTunnelShape(d, r1.deskXOff);
      if (dsh.gapH > 200) {                 // only once the chamber has opened
        const DS = 1.5;
        const deskTopY = (dsh.cy + dsh.gapH / 2) - 24 * DS - 6 * DS;  // floor - legH - topH
        // Match the desk: hangs from the ceiling under inverted gravity.
        ctx.save();
        if (d.gravityInverter) { ctx.translate(0, dsh.cy); ctx.scale(1, -1); ctx.translate(0, -dsh.cy); }
        blitRocky(d.x + r1.deskXOff, deskTopY - FP_H / 2 + 2);
        ctx.restore();
      }
    }
  }

  // ── Hazard chevrons on entrance and exit faces ──
  const fw = 13;
  function drawFace(fx, xOff) {
    if (fx < x0 - fw || fx > x1 + fw) return;
    const sh  = getTunnelShape(d, xOff);
    const top = sh.cy - sh.gapH / 2;
    const bot = sh.cy + sh.gapH / 2;
    const rx  = fx - fw;
    for (let y = 0; y < top; y += 22) {
      ctx.fillStyle = (Math.floor(y / 11) % 2 === 0) ? '#f5c518' : '#14142a';
      ctx.fillRect(rx, y, fw, Math.min(11, top - y));
    }
    for (let y = bot; y < H - GROUND_H; y += 22) {
      ctx.fillStyle = (Math.floor((y - bot) / 11) % 2 === 0) ? '#f5c518' : '#14142a';
      ctx.fillRect(rx, y, fw, Math.min(11, H - GROUND_H - y));
    }
    ctx.fillStyle = 'rgba(80,180,255,0.35)';
    ctx.fillRect(rx, top, fw, sh.gapH);
  }

  // ── Split-path section (even-numbered tunnels only) ──
  if (d.split) {
    const spl  = d.split;
    const visible = (d.x + spl.deadEndX >= x0 && d.x + spl.xStart <= x1);

    // Trace a polygon (xOff-space verts) into a path, translated to world X.
    function tracePoly(poly) {
      ctx.beginPath();
      ctx.moveTo(d.x + poly[0][0], poly[0][1]);
      for (let i = 1; i < poly.length; i++) ctx.lineTo(d.x + poly[i][0], poly[i][1]);
      ctx.closePath();
    }

    if (visible) {
      // Solid divider pieces (the diagonal gap between them is the escape route)
      ctx.fillStyle = bg;
      for (const poly of spl.dividerPolys) { tracePoly(poly); ctx.fill(); }

      // Panel seams, clipped to each piece
      for (const poly of spl.dividerPolys) {
        ctx.save();
        tracePoly(poly); ctx.clip();
        ctx.strokeStyle = 'rgba(70,80,140,0.35)'; ctx.lineWidth = 1;
        for (let px = d.x + spl.xStart; px <= d.x + spl.deadEndX; px += panW) {
          ctx.beginPath(); ctx.moveTo(px, spl.divY_top - 5); ctx.lineTo(px, spl.divY_bot + 5); ctx.stroke();
        }
        ctx.restore();
      }

      // Structural cap + blue guide strip around each piece (incl. diagonal walls)
      ctx.lineJoin = 'round';
      for (const poly of spl.dividerPolys) {
        tracePoly(poly);
        ctx.lineWidth = 9; ctx.strokeStyle = '#2a2a50'; ctx.stroke();
        ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(80,180,255,0.90)'; ctx.stroke();
      }
    }

    // Dead-end face and sealed fill in the closed corridor
    const dex = d.x + spl.deadEndX;
    if (dex >= x0 - fw && dex <= x1 + fw) {
      const closeTop = spl.openUpper ? spl.divY_bot : 62;
      const closeBot = spl.openUpper ? 442         : spl.divY_top;
      // Hazard chevrons on the dead-end face
      for (let y = closeTop; y < closeBot; y += 22) {
        ctx.fillStyle = (Math.floor((y - closeTop) / 11) % 2 === 0) ? '#f5c518' : '#14142a';
        ctx.fillRect(dex - fw, y, fw, Math.min(11, closeBot - y));
      }
      // Solid wall fill past the face (blocks the dead-end channel visually)
      ctx.fillStyle = bg;
      ctx.fillRect(dex, closeTop, x1 - dex + 4, closeBot - closeTop);
    }

    // Entrance face of the split: chevrons where divider first appears
    const sfx = d.x + spl.xStart;
    if (sfx >= x0 - fw && sfx <= x1 + fw) {
      for (let y = spl.divY_top; y < spl.divY_bot; y += 22) {
        ctx.fillStyle = (Math.floor((y - spl.divY_top) / 11) % 2 === 0) ? '#f5c518' : '#14142a';
        ctx.fillRect(sfx, y, fw, Math.min(11, spl.divY_bot - y));
      }
    }
  }

  // ── Floating objects inside rooms ──
  for (const obj of d.internalObjects) {
    const ox = d.x + obj.xOff;
    if (ox + obj.r < x0 || ox - obj.r > x1) continue;
    if (obj.type === 'tv') drawTV(ox, obj.y, obj.angle);
    else                   drawRobot(ox, obj.y, obj.angle);
  }

  // ── Rotating laser turrets (4th structure) ──
  if (d.lasers) for (const lz of d.lasers) drawLaser(d.x + lz.xOff, lz.y, lz.angle, lz.len, x0, x1);

  // ── External entry / exit faces + animated airlock hatches ──
  drawFace(d.x + d.length, d.length);
  drawFace(d.x + fw,       0);
  drawTunnelDoor(d, 0,        d.x);              // entrance hatch
  drawTunnelDoor(d, d.length, d.x + d.length);   // exit hatch

  // ── Internal doorway faces at each zone wall ──
  // Corridor→Room: face shows corridor gap from the corridor side (xOff-1)
  // Room→Corridor: face shows corridor gap from the room side (xOff+1)
  const wallPattern = [
    [d.x + d.wallXoffs[0],        d.wallXoffs[0] - 1],  // entry corridor right wall
    [d.x + d.wallXoffs[1] + fw,   d.wallXoffs[1] + 1],  // room 1 right wall
    [d.x + d.wallXoffs[2],        d.wallXoffs[2] - 1],  // corridor 1 right wall
    [d.x + d.wallXoffs[3] + fw,   d.wallXoffs[3] + 1],  // room 2 right wall
  ];
  for (const [fx, xOff] of wallPattern) drawFace(fx, xOff);

  // ── Gravity-inverter structure: caution sign + blue transition films ──
  if (d.gravityInverter) {
    // Caution sign painted on the entry-corridor lower wall
    const signX = d.x + 150;                       // centre of the entry corridor
    if (signX + 150 >= x0 && signX - 150 <= x1) {
      const sh    = getTunnelShape(d, 150);
      const floor = sh.cy + sh.gapH / 2;           // corridor floor (top of lower wall)
      const ty    = floor + (H - GROUND_H - floor) * 0.45;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(255,180,0,0.85)'; ctx.shadowBlur = 9;
      ctx.fillStyle = '#ffcc00';
      ctx.font = '900 15px "Segoe UI", Arial, sans-serif';
      ctx.fillText('⚠ CAUTION: ⚠', signX, ty - 9);
      ctx.font = '900 17px "Segoe UI", Arial, sans-serif';
      ctx.fillText('GRAVITY INVERTER!', signX, ty + 12);
      ctx.restore();
    }
    // Blue transition films across the gap: one ending where the entry corridor
    // meets the inverted-gravity chamber (xOff 300), one at the structure exit
    // back into normal-gravity space (xOff = length). 100px long, ending at the edge.
    drawTransitionFilm(d, 200, 300, x0, x1);
    drawTransitionFilm(d, d.length - 100, d.length, x0, x1);
  }
}

// A short blue-tinted "membrane" spanning the tunnel gap over [xOffA, xOffB] —
// a visual cue marking a gravity transition the telescope is about to fly through.
function drawTransitionFilm(d, xOffA, xOffB, x0, x1) {
  const wxA = d.x + xOffA, wxB = d.x + xOffB;
  if (wxB < x0 || wxA > x1) return;
  const sh   = getTunnelShape(d, (xOffA + xOffB) / 2);
  const topY = sh.cy - sh.gapH / 2, botY = sh.cy + sh.gapH / 2;
  ctx.save();
  const g = ctx.createLinearGradient(wxA, 0, wxB, 0);
  g.addColorStop(0,   'rgba(90,170,255,0.10)');
  g.addColorStop(0.5, 'rgba(110,195,255,0.34)');
  g.addColorStop(1,   'rgba(90,170,255,0.10)');
  ctx.fillStyle = g;
  ctx.fillRect(wxA, topY, wxB - wxA, botY - topY);
  // Bright edges so the membrane reads clearly
  ctx.strokeStyle = 'rgba(160,215,255,0.6)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(wxA, topY); ctx.lineTo(wxA, botY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wxB, topY); ctx.lineTo(wxB, botY); ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  Telescope craft
// ═══════════════════════════════════════════════════════════════
const craftImg = new Image();
craftImg.src = 'telescope.png';

const nancyImg = new Image();
nancyImg.src = 'nancy.png';

function drawCraft(cx, cy, angle) {
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
  // Thruster flame from the back (left) end on the thrust stroke. Thrust is
  // against gravity, so the trigger flips with gravSign (up normally, down inverted).
  if (SHOW_THRUSTER && angle * gravSign < -0.05) {
    ctx.fillStyle = 'rgba(255,140,0,0.85)';
    ctx.beginPath();
    ctx.moveTo(-30,0); ctx.lineTo(-44-Math.random()*8,-5); ctx.lineTo(-44-Math.random()*8,5);
    ctx.closePath(); ctx.fill();
  }
  ctx.drawImage(craftImg, -30, -15, 60, 29);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  Render functions per state
// ═══════════════════════════════════════════════════════════════
function renderAttract(bobX, bobY) {
  drawBg(); drawGround();
  drawCraft(bobX, bobY, Math.sin(bobT) * 0.18);
}

function renderGame() {
  drawBg();
  for (const d of obstacles) {
    if      (d.kind === 'tunnel') drawTunnel(d);
    else if (d.kind === 'column') drawColumn(d);
    else                          drawDebris(d);
  }
  drawGround();
  drawCraft(CRAFT_X, craftY, Math.max(-0.5, Math.min(1.1, craftV / 14)));

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = '900 44px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 6;
  ctx.fillText(score, W/2, 58);
  ctx.shadowBlur = 0;

  // Tunnel HUD — warning when approaching, label while inside
  const tun = obstacles.find(d => d.kind === 'tunnel');
  if (tun) {
    const re     = tun.x + tun.length;
    const inside = CRAFT_X + CRAFT_R > tun.x && CRAFT_X - CRAFT_R < re;
    if (!inside && re > CRAFT_X && re < CRAFT_X + 700) {
      // Approaching: flashing warning (~10 s window)
      if (Math.sin(Date.now() / 240) > 0) {
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 15px "Segoe UI", Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(255,200,0,0.7)'; ctx.shadowBlur = 10;
        ctx.fillText('⚠  TUNNEL AHEAD  ⚠', W / 2, 92);
        ctx.shadowBlur = 0;
      }
    } else if (inside) {
      const xOff = CRAFT_X - tun.x;
      const spl  = tun.split;
      if (spl && xOff >= spl.xStart - 304 && xOff < spl.deadEndX) {
        // Approaching or inside split section — flash path-choice warning
        if (Math.sin(Date.now() / 180) > 0) {
          ctx.fillStyle = '#ff7020';
          ctx.font = 'bold 14px "Segoe UI", Arial';
          ctx.textAlign = 'center';
          ctx.shadowColor = 'rgba(255,100,0,0.85)'; ctx.shadowBlur = 12;
          ctx.fillText('', W / 2, 92);
          ctx.shadowBlur = 0;
        }
      } else {
        ctx.fillStyle = 'rgba(80,180,255,0.65)';
        ctx.font = '700 11px "Segoe UI", Arial';
        ctx.textAlign = 'center';
        ctx.fillText('', W / 2, 92);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  End game / submit
// ═══════════════════════════════════════════════════════════════
function endGame() {
  state = STATE.DEAD;
  if (score > bestScore) bestScore = score;
  GAME_ID = Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  document.getElementById('final-num').textContent = score;
  document.getElementById('best-num').textContent  = bestScore;
  const sbtn = document.getElementById('submit-btn');
  sbtn.disabled = false; sbtn.textContent = 'Submit Score & View Leaderboard';
  // Pre-fill nickname from last session
  const nickEl = document.getElementById('nickname-input');
  const saved  = localStorage.getItem('rr_nickname');
  if (saved && !nickEl.value.trim()) nickEl.value = saved;
  showOverlay('end-overlay');
}

function submitScore() {
  if (submitted || !GAME_ID) return;
  const nickEl = document.getElementById('nickname-input');
  const nick   = nickEl.value.trim();
  if (!nick) {
    nickEl.classList.remove('shake'); void nickEl.offsetWidth;
    nickEl.classList.add('shake');
    nickEl.placeholder = 'Please enter a nickname!';
    setTimeout(() => { nickEl.classList.remove('shake'); nickEl.focus(); }, 340);
    return;
  }
  PLAYER_NAME = nick;
  localStorage.setItem('rr_nickname', PLAYER_NAME);
  submitted = true;
  const sbtn = document.getElementById('submit-btn');
  sbtn.disabled = true; sbtn.textContent = 'Submitted ✓  — see leaderboard below';
  _stSetValue({ gameId: GAME_ID, player: PLAYER_NAME, score });
}

// ═══════════════════════════════════════════════════════════════
//  Input
// ═══════════════════════════════════════════════════════════════
function onTap() {
  // Act only in the two states where a press means "fly". In ATTRACT/DEAD this
  // is a no-op so the overlay buttons (LAUNCH, Submit, Play Again) and the
  // nickname input keep working — we no longer cancel the event at all.
  if (state === STATE.READY)   { beginPlay();   return; }
  // Flap thrusts opposite to gravity: up normally, down while gravity is inverted.
  if (state === STATE.PLAYING) { craftV = FLAP * gravSign; return; }
}
// Bind to the whole container, not just the canvas: the GET READY / GAME OVER
// overlays sit on top of the canvas, so a tap during READY would otherwise be
// swallowed by the overlay and never reach the canvas. Listening on the shared
// parent catches the tap whichever layer it lands on (this is what makes
// tap-to-start work on mobile, where there's no spacebar fallback).
//
// A single PASSIVE pointerdown covers mouse, touch and pen with one event per
// press (no mousedown+touchstart duplication). Passive + no preventDefault means
// the browser never blocks the frame waiting to see if this handler cancels the
// gesture — that synchronous wait was the one-frame hitch felt on every tap.
// Scroll/zoom are already suppressed by the container's touch-action:none, so
// there is nothing left to preventDefault.
const gameContainer = document.getElementById('game-container');
gameContainer.addEventListener('pointerdown', onTap, { passive: true });
document.addEventListener('keydown', e => {
  if (e.code !== 'Space' && e.key !== ' ') return;
  if (document.activeElement === document.getElementById('nickname-input')) return;
  e.preventDefault();
  if (state === STATE.READY || state === STATE.PLAYING) onTap(null);
});
document.getElementById('nickname-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); submitScore(); }
});

// ═══════════════════════════════════════════════════════════════
//  Boot
// ═══════════════════════════════════════════════════════════════
initScene();
loop();
</script>
