<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #060919;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 20px;
}

/* ── game container (canvas + all overlays stacked on top) ── */
#game-container {
  position: relative;
  width: 100%;
  max-width: 400px;
  border-radius: 14px;
  overflow: hidden;
  border: 2.5px solid #1a3a7a;
  box-shadow: 0 8px 36px rgba(11,61,145,0.50);
  /* Taps are "fly" inputs, never scroll/zoom gestures. Declaring touch-action
     here (on the element that owns the pointerdown listener) lets the browser
     skip gesture/scroll hit-testing instead of stalling the main thread on each
     tap — that wait was the on-tap stutter. tap-highlight/user-select off kills
     the highlight-flash repaint that also hitched a frame. */
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;  /* no long-press callout menu on the play area */
}
#main-canvas {
  display: block;
  width: 100%;
  height: auto;
  cursor: pointer;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── overlays ── */
.overlay {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  align-items: center;
}
.overlay.active { display: flex; }

/* ── start overlay: title top, launch button bottom ── */
#start-overlay {
  background: linear-gradient(180deg, rgba(6,9,25,0.20) 0%, rgba(6,9,25,0.55) 100%);
  justify-content: space-between;
  padding: 44px 24px 56px;
}
.game-title {
  font-size: 1.9rem;
  font-weight: 900;
  letter-spacing: 3px;
  color: #fff;
  text-align: center;
  line-height: 1.2;
  text-shadow: 0 0 32px rgba(95,168,255,0.85), 0 2px 10px rgba(0,0,0,0.7);
  pointer-events: none;
}

/* ── ready overlay: hint at the top ── */
#ready-overlay {
  background: linear-gradient(180deg, rgba(6,9,25,0.08) 0%, rgba(6,9,25,0.22) 100%);
  justify-content: flex-start;
  padding-top: 40px;
  gap: 8px;
}
.ready-title {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 8px;
  color: #fff;
  text-shadow: 0 0 22px rgba(255,200,80,0.75), 0 2px 6px rgba(0,0,0,0.5);
}
.ready-hint {
  font-size: 0.85rem;
  color: rgba(210,225,255,0.92);
  letter-spacing: 0.3px;
  background: rgba(11,61,145,0.60);
  padding: 6px 22px;
  border-radius: 20px;
  border: 1px solid rgba(120,155,230,0.45);
}
.ready-hint strong { color: #ff8c00; }

/* ── end overlay: semi-transparent dark over frozen game ── */
#end-overlay {
  background: rgba(5,8,26,0.80);
  -webkit-backdrop-filter: blur(3px);
  backdrop-filter: blur(3px);
  justify-content: center;
  gap: 12px;
  padding: 24px 22px;
}
.game-over-text {
  font-size: 2.4rem;
  font-weight: 900;
  letter-spacing: 6px;
  color: #ff6b6b;
  text-shadow: 0 0 20px rgba(255,100,100,0.65);
}
.score-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.score-label-sm {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: rgba(170,190,230,0.80);
}
.score-big {
  font-size: 5rem;
  font-weight: 900;
  color: #fff;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.best-line {
  font-size: 0.82rem;
  color: rgba(170,190,230,0.75);
}
.best-line span { color: #ff8c00; font-weight: 800; }
.end-divider {
  width: 55%;
  height: 1px;
  background: rgba(120,150,220,0.28);
}

/* ── nickname (end screen only) ── */
.nickname-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #8ab0e8;
}
#nickname-input {
  width: 100%;
  font-size: 1rem;
  font-weight: 600;
  padding: 10px 15px;
  border: 2px solid rgba(120,150,220,0.50);
  border-radius: 8px;
  outline: none;
  color: #fff;
  background: rgba(10,16,50,0.82);
  text-align: center;
  letter-spacing: 1px;
  transition: border-color 0.18s;
}
#nickname-input::placeholder { color: rgba(175,195,235,0.50); }
#nickname-input:focus {
  border-color: #5fa8ff;
  box-shadow: 0 0 0 3px rgba(95,168,255,0.25);
}
#nickname-input.shake {
  animation: shake 0.32s ease;
  border-color: #e74c3c !important;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-7px); }
  50%       { transform: translateX(7px); }
  80%       { transform: translateX(-4px); }
}

/* ── buttons ── */
.btn-launch {
  padding: 14px 56px;
  font-size: 1.15rem;
  font-weight: 900;
  background: #0b3d91;
  color: #fff;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 0 28px rgba(95,168,255,0.55), 0 4px 14px rgba(0,0,0,0.35);
  transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
}
.btn-launch:hover  { background: #0d4db5; box-shadow: 0 0 36px rgba(95,168,255,0.75); }
.btn-launch:active { transform: scale(0.96); }
.btn-launch:disabled { background: #2d3a55; box-shadow: none; cursor: progress; }
/* launch buttons stacked: full-res LAUNCH + retro 16-BIT */
.launch-row { display: flex; flex-direction: column; align-items: center; gap: 13px; }
.btn-16bit {
  padding: 11px 30px;
  font-size: 0.9rem;
  font-weight: 800;
  background: #7b2d8e;
  color: #fff;
  border: 2px solid #d77ff0;
  border-radius: 4px;                 /* squared, pixel-era look */
  cursor: pointer;
  letter-spacing: 1.5px;
  box-shadow: 0 0 18px rgba(190,90,230,0.45), 0 3px 10px rgba(0,0,0,0.35);
  transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
}
.btn-16bit:hover    { background: #9436ab; box-shadow: 0 0 26px rgba(190,90,230,0.70); }
.btn-16bit:active   { transform: scale(0.96); }
.btn-16bit:disabled { background: #3a2d44; border-color: #5a4a66; box-shadow: none; cursor: progress; }
.btn-submit {
  width: 100%;
  padding: 12px 20px;
  font-size: 0.95rem;
  font-weight: 800;
  background: #27ae60;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  letter-spacing: 0.4px;
  transition: background 0.18s, transform 0.1s;
}
.btn-submit:hover  { background: #229954; }
.btn-submit:active { transform: scale(0.97); }
.btn-submit:disabled { background: #3a5a44; cursor: default; }
.btn-again {
  background: none;
  border: 1.5px solid rgba(120,150,220,0.55);
  color: rgba(180,200,240,0.90);
  padding: 9px 30px;
  border-radius: 10px;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: border-color 0.18s, color 0.18s;
}
.btn-again:hover { border-color: #5fa8ff; color: #fff; }

/* ── watermark (below container) ── */
.watermark {
  font-size: 0.62rem;
  color: rgba(180,200,240,0.28);
  letter-spacing: 0.5px;
  margin-top: 10px;
  user-select: none;
}
</style>
</head>
<body>

<div id="game-container">
  <canvas id="main-canvas" width="400" height="560"></canvas>

  <!-- ATTRACT: game title + launch buttons (full-res / 16-bit) -->
  <div id="start-overlay" class="overlay active">
    <div class="game-title">ROMAN TELESCOPE:<br>Journey to L2!</div>
    <div class="launch-row">
      <button class="btn-launch" id="launch-btn" onclick="goReady(false)" disabled>LAUNCH</button>
      <button class="btn-16bit" id="launch-16bit-btn" onclick="goReady(true)" disabled>▦ 16-BIT MODE</button>
    </div>
  </div>

  <!-- READY: get ready hint, telescope hovering at play position -->
  <div id="ready-overlay" class="overlay">
    <div class="ready-title">GET READY</div>
    <div class="ready-hint">Tap to start <strong>flying</strong>!</div>
  </div>

  <!-- END: game over + score + nickname + actions -->
  <div id="end-overlay" class="overlay">
    <div class="game-over-text">GAME OVER</div>
    <div class="score-panel">
      <div class="score-label-sm">Score</div>
      <div class="score-big" id="final-num">0</div>
      <div class="best-line">Best: <span id="best-num">0</span></div>
    </div>
    <div class="end-divider"></div>
    <div class="nickname-label">Your Nickname</div>
    <input id="nickname-input" type="text" maxlength="20"
           placeholder="Enter a nickname…"
           autocomplete="off" spellcheck="false" />
    <button class="btn-submit" id="submit-btn" onclick="submitScore()">Submit Score &amp; View Leaderboard</button>
    <button class="btn-again" onclick="goReady()">Play Again</button>
  </div>
</div>

<div class="watermark">Created by: S. K. Terry</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  Streamlit bridge
// ═══════════════════════════════════════════════════════════════
function _stPost(type, extra) {
  window.parent.postMessage(
    Object.assign({ isStreamlitMessage: true, type }, extra || {}), '*'
  );
}
function _stSetValue(v) { _stPost('streamlit:setComponentValue', { value: v, dataType: 'json' }); }
function _stSetHeight(h) { _stPost('streamlit:setFrameHeight', { height: h }); }
function updateHeight() { _stSetHeight(document.documentElement.scrollHeight); }

let _stReady = false;
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'streamlit:render') return;
  if (!_stReady) {
    document.getElementById('launch-btn').disabled = false;
    document.getElementById('launch-16bit-btn').disabled = false;
    _stReady = true;
    updateHeight();
  }
});
_stPost('streamlit:componentReady', { apiVersion: 1 });
if (window.ResizeObserver) new ResizeObserver(updateHeight).observe(document.body);
window.addEventListener('load', updateHeight);

// roundRect polyfill (needed before any draw calls)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

// ═══════════════════════════════════════════════════════════════
//  Config — tune feel here
// ═══════════════════════════════════════════════════════════════
const W        = 400, H = 560;
const GROUND_H = 56;
const GRAVITY  = 0.1;
const FLAP     = -3.0;
const MAX_FALL = 4;
const SCROLL   = 1.2;
const SHOW_THRUSTER = true;   // thruster flame on rise (ruled out as a stutter source)
const SPACING  = 185;   // x-distance between obstacle waves
const COL_W    = 50;    // width of column-pair obstacles
const GAP      = 118;   // vertical gap height in column pairs
const CRAFT_X       = 96;
const CRAFT_R       = 10;
const TUNNEL_LENGTH = 3200;  // px — total structure length (exit corridor ~700px)
const TUNNEL_GAP    = 110;   // vertical opening height
// Focal-plane array hazard model — bounding box (wider than tall, like the real
// Roman WFI detector mosaic). Collision uses a box inset from this (see updateGame).
const FP_W = 60, FP_H = 38;

// ═══════════════════════════════════════════════════════════════
//  State machine
// ═══════════════════════════════════════════════════════════════
const STATE = { ATTRACT: 0, READY: 1, PLAYING: 2, DEAD: 3 };
let state = STATE.ATTRACT;

// ── canvas ──
const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');

// Shared scene state
let stars = [];
let bobT  = 0;

// Game-specific state
let craftY, craftV;
let gravSign = 1;            // 1 = normal gravity, -1 = inverted (3rd ship structure)
let obstacles = [];
let score, bestScore = 0;
let GAME_ID = null, submitted = false;
let PLAYER_NAME = '';
let rafHandle   = null;

// Wave scheduler — alternates between floating debris and column pairs
const WAVE = { FLOAT: 'float', COLUMN: 'column' };
let waveType  = WAVE.FLOAT;
let waveCount = 4;

// Tunnel scheduler
let tunnelPending       = false;
let tunnelSplit         = false; // true on every 2nd tunnel (80, 160, … pts)
let tunnelBounce        = false; // true on alternating tunnels → Rocky bounces in Room 1
let tunnelStructIndex   = 0;     // structure number (th) of the pending tunnel
let lastTunnelThreshold = 0;
let bounceChamberSeen   = 0;     // # of bounce chambers spawned so far → array count doubles each time (4, 8, 16, …)

function rand(a, b) { return a + Math.random() * (b - a); }

// ═══════════════════════════════════════════════════════════════
//  Seeded random — keeps asteroid shapes consistent frame-to-frame
// ═══════════════════════════════════════════════════════════════
function seededArr(seed, n) {
  const out = [];
  let s = Math.floor(seed * 99991) % 233280;
  for (let i = 0; i < n; i++) { s = (s * 9301 + 49297) % 233280; out.push(s / 233280); }
  return out;
}

// ═══════════════════════════════════════════════════════════════
//  Stars
// ═══════════════════════════════════════════════════════════════
function buildStars() {
  const arr = [];
  for (let i = 0; i < 70; i++) arr.push({
    x: Math.random() * W,
    y: Math.random() * (H - GROUND_H),
    r: rand(0.4, 1.7),
    layer: Math.random() < 0.4 ? 0.5 : 0.25,
  });
  return arr;
}

function initScene() { stars = buildStars(); }

// ═══════════════════════════════════════════════════════════════
//  Shooting star — rare diagonal streak across the sky
// ═══════════════════════════════════════════════════════════════
let shootingStar = null;   // active streak object, or null when none
let nextShootAt  = 0;      // earliest timestamp (ms) the next one may appear

// Pick a fresh random delay before the next streak is allowed (per game).
// Delay is 5× the original window, making the streak 5× rarer.
function scheduleShootingStar() { nextShootAt = Date.now() + rand(75000, 225000); }

function spawnShootingStar() {
  const fromLeft = Math.random() < 0.5;
  // Enter high in the sky, travel on a shallow downward diagonal
  const ang   = fromLeft ? rand(0.32, 0.58) : Math.PI - rand(0.32, 0.58);
  const speed = rand(7, 10);
  shootingStar = {
    x:    fromLeft ? rand(-10, W * 0.35) : rand(W * 0.65, W + 10),
    y:    rand(8, (H - GROUND_H) * 0.4),
    vx:   Math.cos(ang) * speed,
    vy:   Math.sin(ang) * speed,
    life: 0,
    maxLife: rand(45, 72),   // frames
    len:  rand(65, 115),     // tail length in px
  };
}

function updateShootingStar() {
  if (!shootingStar) {
    // Only ever ignite during active play, after the random delay elapses
    if (state === STATE.PLAYING && Date.now() >= nextShootAt) spawnShootingStar();
    return;
  }
  const s = shootingStar;
  s.x += s.vx * simFactor; s.y += s.vy * simFactor; s.life += simFactor;
  if (s.life > s.maxLife || s.x < -130 || s.x > W + 130 || s.y > H - GROUND_H) {
    shootingStar = null;
    scheduleShootingStar();
  }
}

function drawShootingStar() {
  if (!shootingStar) return;
  const s     = shootingStar;
  const alpha = Math.sin(Math.PI * (s.life / s.maxLife)); // fade in then out (0→1→0)
  const mag   = Math.hypot(s.vx, s.vy) || 1;
  const tx    = s.x - (s.vx / mag) * s.len;
  const ty    = s.y - (s.vy / mag) * s.len;

  // Tail
  const grad = ctx.createLinearGradient(s.x, s.y, tx, ty);
  grad.addColorStop(0,   `rgba(255,255,255,${0.95 * alpha})`);
  grad.addColorStop(0.4, `rgba(170,210,255,${0.45 * alpha})`);
  grad.addColorStop(1,   'rgba(120,170,255,0)');
  ctx.strokeStyle = grad; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(s.x, s.y); ctx.stroke();

  // Soft glow + bright head
  const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 9);
  g.addColorStop(0, `rgba(200,225,255,${0.55 * alpha})`);
  g.addColorStop(1, 'rgba(200,225,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(s.x, s.y, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.beginPath(); ctx.arc(s.x, s.y, 2.3, 0, Math.PI * 2); ctx.fill();
}

// ═══════════════════════════════════════════════════════════════
//  Debris factory — six weighted types freely placed in the field
// ═══════════════════════════════════════════════════════════════
// Spawn weights — asteroids dominate the field; UFOs are as rare as the
// (very rare) shooting star. Boosters/panels are the common man-made debris.
const DEBRIS_WEIGHTS = [
  ['asteroid', 62],
  ['booster',  14],
  ['panel',    13],
  ['astronaut', 6],
  ['comet',     4],
  ['ufo',       1],
];
const DEBRIS_WEIGHT_TOTAL = DEBRIS_WEIGHTS.reduce((s, e) => s + e[1], 0);
const AST_COLORS = ['#5a5562','#6b5a50','#4a4850','#7a6870','#6a6460'];

function pickDebrisType() {
  let r = Math.random() * DEBRIS_WEIGHT_TOTAL;
  for (const [t, w] of DEBRIS_WEIGHTS) if ((r -= w) < 0) return t;
  return 'asteroid';
}

function makeDebris(x, y) {
  const type = pickDebrisType();
  const seed = Math.random() * 9999;
  let w, h, color;
  switch (type) {
    // Asteroids span a wide size range — tiny pebbles to huge boulders.
    case 'asteroid':  w = rand(26,128); h = w * rand(0.72,0.96); color = AST_COLORS[Math.floor(Math.random()*AST_COLORS.length)]; break;
    case 'ufo':       w = rand(98,130); h = 53;  color = '#909aa8'; break;
    case 'booster':   w = rand(30,40);  h = rand(122,166); color = '#e8ebf0'; break;
    case 'panel':     w = rand(112,147); h = 32;  color = '#1a2a8a'; break;
    case 'astronaut': w = 46; h = rand(56, 66);  color = '#eef1f6'; break;
    case 'comet':     w = rand(40, 58); h = w;   color = '#88aacc'; break;
  }
  return {
    kind: 'debris',
    x, y, type, w, h, color, scored: false,
    angle: type === 'comet' ? Math.random() * Math.PI * 2 : rand(-0.38, 0.38),
    shape: type === 'asteroid' ? seededArr(seed, 9) : [],
  };
}

function spawnGroup(baseX) {
  const margin = 54;
  const usedY  = [];
  for (let i = 0; i < 2; i++) {
    let y, tries = 0;
    do { y = rand(margin, H - GROUND_H - margin); tries++; }
    while (tries < 30 && usedY.some(uy => Math.abs(uy - y) < 140));
    usedY.push(y);
    obstacles.push(makeDebris(baseX + (i === 0 ? 0 : rand(-30, 46)), y));
  }
}

function spawnColumn(baseX) {
  const minY = 60, maxY = H - GROUND_H - GAP - 60;
  const gapY = rand(minY, maxY);
  obstacles.push({ kind: 'column', x: baseX, w: COL_W, gapY, gap: GAP, scored: false });
}

function pickNextWave() {
  const current = waveType;
  waveCount--;
  if (waveCount <= 0) {
    waveType  = current === WAVE.FLOAT ? WAVE.COLUMN : WAVE.FLOAT;
    waveCount = waveType === WAVE.FLOAT
      ? Math.floor(rand(2, 5))   // 2–4 floating groups
      : Math.floor(rand(3, 6));  // 3–5 column pairs
  }
  return current;
}

function spawnWave(baseX) {
  if (pickNextWave() === WAVE.COLUMN) spawnColumn(baseX);
  else spawnGroup(baseX);
}

function spawnTunnel(baseX, isSplit = false, bounceRocky = false, structIndex = 0) {
  const ROOM_H = 380;
  const COR_H  = TUNNEL_GAP;
  const midCY  = (H - GROUND_H) / 2;
  const minCY  = 75 + COR_H / 2;
  const maxCY  = H - GROUND_H - COR_H / 2 - 75;

  const cy1 = Math.max(minCY, Math.min(maxCY, midCY + rand(-90, 90)));

  // Same-x pairs create instant (sharp) vertical walls between zones.
  // Zones: entry corridor (300px) → Room 1 (700px) → Corridor 1 (600px) → Room 2 (1120px) → exit (1600px)
  const keyframes = [
    { x:    0, cy: midCY, gapH: COR_H  }, // entrance
    { x:  300, cy: midCY, gapH: COR_H  }, // entry corridor end  ─┐ sharp wall
    { x:  300, cy: midCY, gapH: ROOM_H }, // room 1 opens        ─┘
    { x: 1000, cy: midCY, gapH: ROOM_H }, // room 1 end          ─┐ sharp wall
    { x: 1000, cy: cy1,   gapH: COR_H  }, // corridor 1 (random) ─┘
    { x: 1600, cy: cy1,   gapH: COR_H  }, // corridor 1 end      ─┐ sharp wall
    { x: 1600, cy: midCY, gapH: ROOM_H }, // room 2 opens        ─┘
    { x: 2720, cy: midCY, gapH: ROOM_H }, // room 2 end          ─┐ sharp wall
    { x: 2720, cy: midCY, gapH: COR_H  }, // exit corridor       ─┘
    { x: TUNNEL_LENGTH, cy: midCY, gapH: COR_H }, // exit
  ];

  // x-offsets where zone walls sit — used to render internal doorway faces
  const wallXoffs = [300, 1000, 1600, 2720];

  // Split path: every other tunnel gets two exit corridors — one open, one dead-end.
  // Geometry: Room 2 spans xOff 1600–2720. The divider drops at xOff 2100,
  // splitting into an upper channel (y 62–168) and lower channel (y 336–442).
  // The dead-end corridor ends at a wall face at xOff 2650, BUT the divider has a
  // wide diagonal connector tunnel carved through it: a player who picked the
  // dead-end channel can navigate up/down through this slanted passage and escape
  // into the open channel before reaching the sealed wall. The band is tall and the
  // connector long & gradual so the telescope clears the diagonal walls comfortably.
  let split = null;
  if (isSplit) {
    const yT = 168, yB = 336;          // band (divider) top / bottom edges (taller band)
    const xL = 2100, xR = 2650;        // band left edge / dead-end wall face (pushed back)
    const CW = 160, run = 260;         // connector width (x) and diagonal run (x)
    const dx1 = 2200, dx2 = dx1 + CW;  // connector opening on the DEAD-channel side
    const ox1 = dx1 + run, ox2 = ox1 + CW; // connector opening on the OPEN-channel side
    const openUpper = Math.random() < 0.5;

    // Two solid divider pieces (polygons in xOff space) leaving a diagonal gap.
    // openUpper: open channel is on top → connector rises left→right (dead side at
    //            the band bottom, open side at the band top).
    // !openUpper: mirrored vertically → connector descends.
    let leftPoly, rightPoly, corridor;
    if (openUpper) {
      leftPoly  = [[xL, yT], [ox1, yT], [dx1, yB], [xL, yB]];
      rightPoly = [[ox2, yT], [xR, yT], [xR, yB], [dx2, yB]];
      corridor  = [[ox1, yT], [ox2, yT], [dx2, yB], [dx1, yB]];
    } else {
      leftPoly  = [[xL, yB], [ox1, yB], [dx1, yT], [xL, yT]];
      rightPoly = [[ox2, yB], [xR, yB], [xR, yT], [dx2, yT]];
      corridor  = [[ox1, yB], [ox2, yB], [dx2, yT], [dx1, yT]];
    }

    split = {
      xStart:   xL,        // where the dividing wall begins (inside Room 2)
      divY_top: yT,        // top of dividing band
      divY_bot: yB,        // bottom of dividing band
      deadEndX: xR,        // x-offset of sealed corridor wall face
      openUpper,           // which channel is the safe one
      dividerPolys: [leftPoly, rightPoly],
      corridor,            // the diagonal escape passage (for rendering)
    };

    // Align the exit corridor with the open sub-channel so the player doesn't
    // slam into a wall at xOff 2720 when the room narrows back to COR_H.
    const exitCY = openUpper
      ? (62 + yT) / 2   // upper channel centre ≈ 115
      : (yB + 442) / 2; // lower channel centre ≈ 389
    keyframes[8] = { x: 2720,          cy: exitCY, gapH: COR_H };
    keyframes[9] = { x: TUNNEL_LENGTH, cy: exitCY, gapH: COR_H };
  }

  // Floating obstacles spread evenly across Room 2. They sit in three equal
  // sub-bands (each jittered) so they're distributed through the chamber rather
  // than bunched at the entry side. On split tunnels they stay left of the
  // divider (xOff 2100); on normal tunnels they use the full room (ends 2720).
  const r2s   = 1600;
  const oMin  = r2s + 70;
  const oMax  = isSplit ? 2040 : 2620;
  const oBand = (oMax - oMin) / 3;
  // spin: slow clockwise angular velocity (rad/frame, positive = clockwise on a y-down canvas)
  // The 4th structure is a laser gauntlet — its chambers hold no floating debris.
  const laserChamber = structIndex === 4;
  const objTypes = ['robot', 'tv', 'robot'];
  const internalObjects = laserChamber ? [] : objTypes.map((type, i) => ({
    type,
    xOff:  oMin + oBand * i + rand(oBand * 0.18, oBand * 0.82),
    y:     midCY + rand(-100, 100),
    r:     type === 'tv' ? 38 : 30,
    angle: Math.random() * Math.PI * 2,
    spin:  rand(0.006, 0.012),
  }));

  // 4th structure: two rotating laser turrets mounted near the middle of each
  // chamber's back wall (Room 1 + Room 2) — red sweeping beams, lethal on contact.
  let lasers = null;
  if (laserChamber) {
    const dir = () => (Math.random() < 0.5 ? -1 : 1);
    const mk  = (xOff) => ({ xOff, y: midCY, angle: Math.random() * Math.PI * 2,
                             spin: dir() * rand(0.009, 0.014), len: 138 });
    lasers = [ mk(520),  mk(780),      // Room 1 (centre xOff 650)
               mk(2030), mk(2290) ];   // Room 2 (centre xOff 2160)
  }

  // Room 1 furniture (xOff 300–1000): a static desk holds the focal-plane array
  // (in non-bouncing structures), while in alternating ones (bounceRocky) four
  // arrays drift and bounce around the chamber — see updateGame / drawTunnel.
  // A framed Nancy portrait hangs on the back wall in a zone clear of the window
  // (which spans xOff 500–800).
  const deskLeft = Math.random() < 0.5;
  const leftX  = rand(410, 590);
  const rightX = rand(710, 930);
  const room1 = {
    deskXOff: deskLeft ? leftX : rightX,
    rockyBounces: bounceRocky,
    portraitXOff: Math.random() < 0.5 ? rand(355, 450) : rand(850, 945),
    // 1st structure only: a bed rests on the floor OPPOSITE the desk (so it never
    // overlaps the desk/chair); being on the floor keeps it clear of the wall
    // portrait and the ceiling window too.
    bedXOff: structIndex === 1 ? (deskLeft ? rand(795, 835) : rand(455, 495)) : null,
  };
  if (bounceRocky) {
    // Bounce bounds: chamber interior inset so the array never clips a wall.
    const halfW = FP_W / 2, halfH = FP_H / 2, rPad = 14;
    const roomTopY = midCY - ROOM_H / 2, roomBotY = midCY + ROOM_H / 2;
    room1.rMinX = 300  + halfW + rPad;
    room1.rMaxX = 1000 - halfW - rPad;
    room1.rMinY = roomTopY + halfH + rPad;
    room1.rMaxY = roomBotY - halfH - rPad;
    // Solid focal-plane arrays drift and bounce around the chamber. The count
    // doubles every time a bounce chamber is encountered: 4, then 8, 16, … —
    // the player must dodge every one (a single hit ends the round). Capped to
    // keep the swarm renderable.
    const rockyCount = Math.min(256, 4 * Math.pow(2, bounceChamberSeen));
    bounceChamberSeen++;
    room1.rockies = [];
    for (let i = 0; i < rockyCount; i++) {
      room1.rockies.push({
        x:  rand(room1.rMinX, room1.rMaxX),
        y:  rand(room1.rMinY, room1.rMaxY),
        vx: (Math.random() < 0.5 ? -1 : 1) * rand(0.35, 0.55),
        vy: (Math.random() < 0.5 ? -1 : 1) * rand(0.35, 0.55),
      });
    }
  }

  obstacles.push({
    kind: 'tunnel',
    x: baseX,
    length: TUNNEL_LENGTH,
    tunnelH: TUNNEL_GAP,
    keyframes,
    wallXoffs,
    internalObjects,
    lasers,
    room1,
    split,
    structIndex,
    gravityInverter: structIndex === 3,   // 3rd structure flips gravity
    laserChamber,                          // 4th structure → rotating laser hazards
    scored: true,
  });
}

// Circle-vs-AABB for collision
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx, dy = cy - ny;
  return dx*dx + dy*dy < cr*cr;
}

// Squared distance from point (px,py) to segment (ax,ay)-(bx,by)
function distToSeg2(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx*dx + dy*dy || 1;
  let t = ((px - ax) * dx + (py - ay) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const qx = ax + t*dx, qy = ay + t*dy;
  const ex = px - qx, ey = py - qy;
  return ex*ex + ey*ey;
}

// Circle-vs-polygon collision. poly is an array of [x,y] vertices in xOff space;
// xShift translates them into world coordinates (the tunnel's left edge).
function circlePoly(cx, cy, cr, poly, xShift) {
  xShift = xShift || 0;
  // 1) centre inside polygon? (ray-cast)
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i][0] + xShift, yi = poly[i][1];
    const xj = poly[j][0] + xShift, yj = poly[j][1];
    if (((yi > cy) !== (yj > cy)) &&
        (cx < (xj - xi) * (cy - yi) / (yj - yi) + xi)) inside = !inside;
  }
  if (inside) return true;
  // 2) any edge within cr of the centre?
  const cr2 = cr * cr;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i][0] + xShift, yi = poly[i][1];
    const xj = poly[j][0] + xShift, yj = poly[j][1];
    if (distToSeg2(cx, cy, xi, yi, xj, yj) < cr2) return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════════════════
//  Screen transitions
// ═══════════════════════════════════════════════════════════════
function showOverlay(id) {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
  updateHeight();
}

function goReady(pixel) {
  // LAUNCH passes false, 16-BIT MODE passes true; "Play Again" passes nothing,
  // so it preserves whichever mode the player last chose.
  if (pixel !== undefined) pixelMode = pixel;
  craftY = H / 2; craftV = 0;
  state  = STATE.READY;
  showOverlay('ready-overlay');
}

function beginPlay() {
  state = STATE.PLAYING; craftV = FLAP; gravSign = 1;
  score = 0; submitted = false; obstacles = [];
  waveType = WAVE.FLOAT; waveCount = 4; // first 4 waves guaranteed float
  tunnelPending = false; tunnelSplit = false; tunnelBounce = false;
  tunnelStructIndex = 0; lastTunnelThreshold = 0; bounceChamberSeen = 0;
  shootingStar = null; scheduleShootingStar();
  let sx = W + 140;
  for (let g = 0; g < 4; g++) { spawnWave(sx); sx += SPACING; }
  showOverlay(null);
}

// ═══════════════════════════════════════════════════════════════
//  Main loop — fixed-timestep simulation, decoupled from render rate
//  so the game runs at the same real-time speed on every device (a slow
//  phone simply draws fewer frames; it never runs in slow-motion).
// ═══════════════════════════════════════════════════════════════
// TARGET_FPS sets the real-time game speed on EVERY device. 120 matches the feel
// of a 120Hz desktop (where the old per-frame code effectively ran). Motion is
// scaled by real elapsed time (see simFactor), so the speed is identical on any
// refresh rate — a 60Hz phone just applies a bigger step per drawn frame.
const TARGET_FPS = 120;
const SIM_STEP   = 1000 / TARGET_FPS;  // reference frame time (ms) the speed is tuned to
const MAX_FACTOR = 4;                  // clamp after stalls / very low fps so the craft eases
                                       // off instead of lurching (and can't skip obstacles)

// ── Mobile render-cadence cap ──────────────────────────────────
// Touch-primary devices (phones/tablets) cap the render rate at 60fps; desktops
// keep their native rate (typically 120). At 120Hz the per-frame budget is only
// ~8.3ms, so the few ms of main-thread work a *tap* costs (gesture hit-testing +
// synthesised compat events) overruns the frame — the next frame lands late, its
// elapsed time spikes, and simFactor scales the whole scene forward in one big
// step: the on-tap "stutter". Drawing every other 120Hz tick gives a ~16.6ms
// budget that absorbs that touch cost, so the cadence stays even through a tap.
// TARGET_FPS stays 120 (the speed reference), so simFactor just lands at ~2.0 per
// drawn frame on mobile → identical real-time speed, half the frames.
// Detection is capability-based (not user-agent): a touch-primary device reports
// a coarse pointer and no hover; touch *laptops* keep a fine pointer + hover and
// are correctly left at full rate.
const THROTTLE_60 = !!(window.matchMedia
  && window.matchMedia('(pointer: coarse)').matches
  && window.matchMedia('(hover: none)').matches);
const MIN_FRAME_MS = THROTTLE_60 ? 1000 / 60 : 0;  // 0 = no cap (desktop)
const FRAME_SLOP   = 1000 / 240;                   // ~4.2ms tolerance so a 120Hz display
                                                   // lands cleanly on 60fps, not 40

let _lastT = 0;
// simFactor = how many reference (1/120 s) frames of motion to apply this frame.
// 1.0 at 120fps, 2.0 at 60fps, 4.0 at 30fps → same real-time speed everywhere,
// but with smooth fractional steps instead of quantised whole ticks (no judder).
let simFactor = 1;

// One time-scaled update. Star/shooting-star drift run in every state; craft
// physics only while playing; the idle bob while in attract/ready.
function stepSim() {
  for (const s of stars) {
    s.x -= SCROLL * s.layer * simFactor;
    if (s.x < -2) { s.x = W + 2; s.y = Math.random() * (H - GROUND_H); }
  }
  updateShootingStar();
  if (state === STATE.ATTRACT || state === STATE.READY) {
    bobT += 0.045 * simFactor;
    craftY = H / 2 + Math.sin(bobT) * 14;
  } else if (state === STATE.PLAYING) {
    updateGame();
  }
}

// ═══════════════════════════════════════════════════════════════
//  16-bit post-process filter — pixelation + colour quantisation
//  Each frame is rendered normally, then downscaled to a low internal
//  resolution, quantised to a small palette, and scaled back up with
//  nearest-neighbour sampling. This single cheap pass turns EVERY visual
//  16-bit at once — no per-asset re-rendering needed.
// ═══════════════════════════════════════════════════════════════
let pixelMode = false;
const PIX_W = 160, PIX_H = 224;          // 16-bit internal resolution (matches the 400×560 ratio)
const _pcanvas = document.createElement('canvas');
_pcanvas.width = PIX_W; _pcanvas.height = PIX_H;
const _pctx = _pcanvas.getContext('2d', { willReadFrequently: true });

// Per-channel posterisation LUT → chunky retro colour steps.
const _Q_LEVELS = 6;
const _qLUT = new Uint8Array(256);
for (let i = 0; i < 256; i++) {
  _qLUT[i] = Math.round(Math.round(i / 255 * (_Q_LEVELS - 1)) / (_Q_LEVELS - 1) * 255);
}

function applyPixelFilter() {
  // 1) Downsample the full frame (smoothing on → averaged blocks)
  _pctx.imageSmoothingEnabled = true;
  _pctx.clearRect(0, 0, PIX_W, PIX_H);
  _pctx.drawImage(canvas, 0, 0, W, H, 0, 0, PIX_W, PIX_H);
  // 2) Quantise colours to the retro palette
  const img = _pctx.getImageData(0, 0, PIX_W, PIX_H);
  const px = img.data;
  for (let i = 0; i < px.length; i += 4) {
    px[i]     = _qLUT[px[i]];
    px[i + 1] = _qLUT[px[i + 1]];
    px[i + 2] = _qLUT[px[i + 2]];
  }
  _pctx.putImageData(img, 0, 0);
  // 3) Scale back up with nearest-neighbour → chunky 16-bit pixels
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(_pcanvas, 0, 0, PIX_W, PIX_H, 0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
}

function render() {
  if (state === STATE.ATTRACT || state === STATE.READY) {
    const bobX = state === STATE.ATTRACT ? W / 2 : CRAFT_X;
    renderAttract(bobX, craftY);
  } else {
    renderGame();  // playing, or frozen frame under end overlay
  }
  if (pixelMode) applyPixelFilter();   // 16-bit mode: post-process the whole frame
}

function loop(now) {
  rafHandle = requestAnimationFrame(loop);
  now = now || performance.now();
  if (!_lastT) { _lastT = now; render(); return; }  // establish time baseline
  const elapsed = now - _lastT;
  // Mobile cadence cap: skip rAF ticks that arrive sooner than the 60fps interval
  // (minus a small slop so a 120Hz display lands on 60fps, not 40). _lastT only
  // advances on frames we actually process, so the elapsed step stays correct.
  if (MIN_FRAME_MS && elapsed < MIN_FRAME_MS - FRAME_SLOP) return;
  _lastT = now;
  // Scale this frame's motion by real elapsed time, normalised to the 120fps
  // reference. One smooth, time-proportional update per drawn frame → identical
  // speed and no quantisation judder on any refresh rate (60/90/120/144…).
  simFactor = Math.min(elapsed / SIM_STEP, MAX_FACTOR);
  stepSim();
  render();
}

// ═══════════════════════════════════════════════════════════════
//  Physics
// ═══════════════════════════════════════════════════════════════
function updateGame() {
  // Gravity inverter (3rd structure): gravity flips once the craft passes the
  // Room-1 interface (xOff 300) and stays flipped until it exits the structure
  // (past its end). Recomputed each frame so it self-clears on exit.
  gravSign = 1;
  for (const d of obstacles) {
    if (d.kind === 'tunnel' && d.gravityInverter) {
      const xOff = CRAFT_X - d.x;
      if (xOff >= 300 && xOff <= d.length) gravSign = -1;
    }
  }
  craftV += GRAVITY * gravSign * simFactor;
  craftV = gravSign > 0 ? Math.min(craftV, MAX_FALL) : Math.max(craftV, -MAX_FALL);
  craftY += craftV * simFactor;

  // Queue a tunnel every 40 points; even-numbered triggers (80, 160 …) get split paths
  const th = Math.floor(score / 25);
  if (score > 0 && th > lastTunnelThreshold) {
    tunnelPending = true;
    tunnelSplit = (th % 2 === 0);
    tunnelBounce = (th % 2 === 0);  // structure #1 floor, #2 bounces, #3 floor, …
    if (th === 4) { tunnelSplit = false; tunnelBounce = false; }  // 4th = clean laser gauntlet
    tunnelStructIndex = th;         // structure number → tags the gravity-inverter (3rd) / lasers (4th)
    lastTunnelThreshold = th;
  }

  for (const d of obstacles) {
    d.x -= SCROLL * simFactor;
    // Slowly rotate the robots/TV floating inside each tunnel (clockwise)
    if (d.kind === 'tunnel') {
      for (const obj of d.internalObjects) obj.angle += obj.spin * simFactor;
      if (d.lasers) for (const lz of d.lasers) lz.angle += lz.spin * simFactor;
      // In bouncing structures, drift the Rockys around Room 1, reflecting off the walls.
      if (d.room1.rockyBounces) {
        const r1 = d.room1;
        for (const rk of r1.rockies) {
          rk.x += rk.vx * simFactor; rk.y += rk.vy * simFactor;
          if      (rk.x < r1.rMinX) { rk.x = r1.rMinX; rk.vx =  Math.abs(rk.vx); }
          else if (rk.x > r1.rMaxX) { rk.x = r1.rMaxX; rk.vx = -Math.abs(rk.vx); }
          if      (rk.y < r1.rMinY) { rk.y = r1.rMinY; rk.vy =  Math.abs(rk.vy); }
          else if (rk.y > r1.rMaxY) { rk.y = r1.rMaxY; rk.vy = -Math.abs(rk.vy); }
        }
      }
    }
    // Tunnel earns no points (scored:true from birth); debris/columns score normally
    if (!d.scored && d.x + d.w / 2 < CRAFT_X - CRAFT_R) { d.scored = true; score++; }
  }

  // Remove off-screen obstacles (tunnel uses left-edge x + length; others use center x + w/2)
  obstacles = obstacles.filter(d =>
    d.kind === 'tunnel' ? d.x + d.length > -12 : d.x + d.w / 2 > -12
  );

  // Rightmost point — tunnel's right edge keeps maxX high, suppressing new waves during traversal
  const maxX = obstacles.length
    ? Math.max(...obstacles.map(d => d.kind === 'tunnel' ? d.x + d.length : d.x))
    : W;
  if (maxX < W + SPACING) {
    if (tunnelPending) {
      spawnTunnel(maxX + SPACING, tunnelSplit, tunnelBounce, tunnelStructIndex);
      tunnelPending = false; tunnelSplit = false; tunnelBounce = false;
    } else {
      spawnWave(maxX + rand(SPACING * 0.9, SPACING * 1.2));
    }
  }

  const top = craftY - CRAFT_R, bot = craftY + CRAFT_R;
  if (bot >= H - GROUND_H || top <= 0) { endGame(); return; }

  for (const d of obstacles) {
    if (d.kind === 'tunnel') {
      if (CRAFT_X + CRAFT_R > d.x && CRAFT_X - CRAFT_R < d.x + d.length) {
        const sh   = getTunnelShape(d, CRAFT_X - d.x);
        const topY = sh.cy - sh.gapH / 2;
        const botY = sh.cy + sh.gapH / 2;
        if (craftY - CRAFT_R < topY || craftY + CRAFT_R > botY) { endGame(); return; }
        for (const obj of d.internalObjects) {
          if (Math.hypot(CRAFT_X - (d.x + obj.xOff), craftY - obj.y) < CRAFT_R + obj.r) {
            endGame(); return;
          }
        }
        // Rotating laser beams (4th structure) — a beam touching the craft is fatal.
        if (d.lasers) {
          const LR = CRAFT_R + 2;                  // beam half-thickness margin
          for (const lz of d.lasers) {
            const mx = d.x + lz.xOff, my = lz.y;
            const tx = mx + Math.cos(lz.angle) * lz.len;
            const ty = my + Math.sin(lz.angle) * lz.len;
            if (distToSeg2(CRAFT_X, craftY, mx, my, tx, ty) < LR * LR) { endGame(); return; }
          }
        }
        // Bouncing focal-plane arrays are solid — hitting one ends the round.
        // Box collision (inset from the model) matches the wide detector shape.
        if (d.room1.rockyBounces) {
          const hbW = FP_W * 0.42, hbH = FP_H * 0.42;
          for (const rk of d.room1.rockies) {
            if (circleRect(CRAFT_X, craftY, CRAFT_R, (d.x + rk.x) - hbW, rk.y - hbH, hbW * 2, hbH * 2)) {
              endGame(); return;
            }
          }
        }
        if (d.split) {
          const spl = d.split;
          const xOff = CRAFT_X - d.x;
          if (xOff >= spl.xStart) {
            // Solid divider pieces — the diagonal connector between them is the
            // escape route, so collision is tested against the two polygons.
            for (const poly of spl.dividerPolys) {
              if (circlePoly(CRAFT_X, craftY, CRAFT_R, poly, d.x)) { endGame(); return; }
            }
            // Dead-end wall: kills a craft that never crossed to the open channel.
            if (CRAFT_X + CRAFT_R >= d.x + spl.deadEndX) {
              const inUpper = craftY < (spl.divY_top + spl.divY_bot) / 2;
              if (spl.openUpper ? !inUpper : inUpper) { endGame(); return; }
            }
          }
        }
      }
    } else if (d.kind === 'column') {
      const hw = d.w / 2;
      if (circleRect(CRAFT_X, craftY, CRAFT_R, d.x - hw, 0, d.w, d.gapY)) { endGame(); return; }
      const botY = d.gapY + d.gap, botH = H - GROUND_H - botY;
      if (botH > 0 && circleRect(CRAFT_X, craftY, CRAFT_R, d.x - hw, botY, d.w, botH)) { endGame(); return; }
    } else {
      if (circleRect(CRAFT_X, craftY, CRAFT_R, d.x - d.w/2, d.y - d.h/2, d.w, d.h)) { endGame(); return; }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  Background + ground
// ═══════════════════════════════════════════════════════════════
let _skyGrad = null;
function drawBg() {
  if (!_skyGrad) {
    _skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    _skyGrad.addColorStop(0, '#0a0e2a'); _skyGrad.addColorStop(0.6, '#13193f'); _skyGrad.addColorStop(1, '#1c1140');
  }
  ctx.fillStyle = _skyGrad; ctx.fillRect(0, 0, W, H);
  for (const s of stars) {
    ctx.globalAlpha = s.layer > 0.4 ? 0.9 : 0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  drawShootingStar();
}

let _groundGrad = null;
function drawGround() {
  if (!_groundGrad) {
    _groundGrad = ctx.createLinearGradient(0, H-GROUND_H, 0, H);
    _groundGrad.addColorStop(0, '#3a3550'); _groundGrad.addColorStop(1, '#211d33');
  }
  ctx.fillStyle = _groundGrad; ctx.fillRect(0, H-GROUND_H, W, GROUND_H);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  for (let x = 0; x < W; x += 26) {
    ctx.beginPath();
    ctx.arc(x + ((Date.now()/80) % 26), H - GROUND_H + 16, 5, 0, Math.PI*2);
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════
//  Debris renderers
// ═══════════════════════════════════════════════════════════════
function drawDebris(d) {
  switch (d.type) {
    case 'asteroid':  drawAsteroid(d);  break;
    case 'ufo':       drawUFO(d);       break;
    case 'booster':   drawBooster(d);   break;
    case 'panel':     drawPanel(d);     break;
    case 'astronaut': drawAstronaut(d); break;
    case 'comet':     drawComet(d);     break;
  }
}

function hexLighten(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;
}

function drawAsteroid(d) {
  ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.angle);
  const rx = d.w/2, ry = d.h/2, sh = d.shape;
  ctx.beginPath();
  for (let i = 0; i < sh.length; i++) {
    const a = (i / sh.length) * Math.PI * 2;
    const r = 0.62 + sh[i] * 0.72;
    i === 0 ? ctx.moveTo(Math.cos(a)*rx*r, Math.sin(a)*ry*r)
            : ctx.lineTo(Math.cos(a)*rx*r, Math.sin(a)*ry*r);
  }
  ctx.closePath();
  const ag = ctx.createRadialGradient(-rx*0.2,-ry*0.25,1,0,0,Math.max(rx,ry));
  ag.addColorStop(0, hexLighten(d.color, 28)); ag.addColorStop(1, d.color);
  ctx.fillStyle = ag; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.arc(-rx*0.18,-ry*0.22,Math.min(rx,ry)*0.30,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( rx*0.32, ry*0.18,Math.min(rx,ry)*0.17,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawUFO(d) {
  ctx.save(); ctx.translate(d.x, d.y);
  const hw = d.w/2, hh = d.h/2;
  // Disk
  const dg = ctx.createLinearGradient(0,-hh,0,hh);
  dg.addColorStop(0,'#b8c2d0'); dg.addColorStop(1,'#707880');
  ctx.fillStyle = dg;
  ctx.beginPath(); ctx.ellipse(0,hh*0.2,hw,hh*0.7,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#5a6068'; ctx.lineWidth = 1; ctx.stroke();
  // Green dome
  ctx.fillStyle = '#44cc66';
  ctx.beginPath(); ctx.ellipse(0,hh*0.05,hw*0.42,hh*0.82,0,Math.PI,0); ctx.fill();
  ctx.strokeStyle = '#33aa55'; ctx.stroke();
  // Dome sheen
  ctx.fillStyle = 'rgba(180,255,200,0.20)';
  ctx.beginPath(); ctx.ellipse(-hw*0.12,-hh*0.18,hw*0.15,hh*0.34,-0.4,0,Math.PI*2); ctx.fill();
  // Running lights
  ['#ff4444','#ffcc00','#00aaff'].forEach((c,i) => {
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc((i-1)*hw*0.38,hh*0.12,2.8,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// Falcon-9-style first-stage booster: slender white cylinder, sooty lower body,
// grid fins near the top, deployed landing legs, and a bright retropropulsion plume.
function drawBooster(d) {
  ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.angle);
  const w = d.w, h = d.h, hw = w / 2, hh = h / 2;
  const topY = -hh, botY = hh;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';

  // ── Retropropulsion plume (drawn first; the base overlaps its root) ──
  const plumeLen = h * (0.42 + Math.random() * 0.12);
  const pg = ctx.createLinearGradient(0, botY, 0, botY + plumeLen);
  pg.addColorStop(0,    'rgba(255,245,200,0.95)');
  pg.addColorStop(0.35, 'rgba(255,168,46,0.85)');
  pg.addColorStop(1,    'rgba(255,80,20,0)');
  ctx.fillStyle = pg;
  ctx.beginPath();
  ctx.moveTo(-w * 0.34, botY - 2);
  ctx.quadraticCurveTo(-w * 0.12, botY + plumeLen * 0.55, 0, botY + plumeLen);
  ctx.quadraticCurveTo( w * 0.12, botY + plumeLen * 0.55, w * 0.34, botY - 2);
  ctx.closePath(); ctx.fill();
  const ig = ctx.createLinearGradient(0, botY, 0, botY + plumeLen * 0.6);
  ig.addColorStop(0, 'rgba(255,255,245,0.95)');
  ig.addColorStop(1, 'rgba(255,210,120,0)');
  ctx.fillStyle = ig;
  ctx.beginPath();
  ctx.moveTo(-w * 0.16, botY - 2);
  ctx.quadraticCurveTo(0, botY + plumeLen * 0.5, 0, botY + plumeLen * 0.64);
  ctx.quadraticCurveTo(0, botY + plumeLen * 0.5, w * 0.16, botY - 2);
  ctx.closePath(); ctx.fill();

  // ── Landing legs (deployed, splayed; behind the body) ──
  function leg(side) {
    const ax = side * hw * 0.6, ay = botY - h * 0.16;   // attach point on lower body
    const fx = side * hw * 1.9, fy = botY + 1;           // splayed-out foot
    ctx.strokeStyle = '#202028'; ctx.lineWidth = Math.max(2.5, w * 0.09);
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(fx, fy); ctx.stroke();
    ctx.lineWidth = Math.max(1.4, w * 0.05);             // A-frame brace
    ctx.beginPath(); ctx.moveTo(side * hw * 0.5, botY - h * 0.05); ctx.lineTo(fx, fy); ctx.stroke();
    ctx.fillStyle = '#15151b';                           // foot pad
    ctx.beginPath(); ctx.ellipse(fx, fy, w * 0.12, w * 0.06, 0, 0, Math.PI * 2); ctx.fill();
  }
  leg(-1); leg(1);

  // ── Body cylinder with cylindrical (left-dark→centre-light) shading ──
  const r  = Math.min(5, hw * 0.5);
  const bg = ctx.createLinearGradient(-hw, 0, hw, 0);
  bg.addColorStop(0,    '#9298a6');
  bg.addColorStop(0.45, '#f1f3f8');
  bg.addColorStop(0.62, '#eceff5');
  bg.addColorStop(1,    '#a6acba');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.roundRect(-hw, topY, w, h, r); ctx.fill();

  // Interior detailing, clipped to the body
  ctx.save();
  ctx.beginPath(); ctx.roundRect(-hw, topY, w, h, r); ctx.clip();
  // Sooty scorched lower section
  const soot = ctx.createLinearGradient(0, topY + h * 0.42, 0, botY);
  soot.addColorStop(0,    'rgba(28,28,33,0)');
  soot.addColorStop(0.55, 'rgba(24,24,29,0.62)');
  soot.addColorStop(1,    'rgba(10,10,13,0.95)');
  ctx.fillStyle = soot;
  ctx.fillRect(-hw, topY + h * 0.42, w, h * 0.58);
  // Black interstage band near the top
  ctx.fillStyle = '#181820';
  ctx.fillRect(-hw, topY + h * 0.085, w, h * 0.05);
  // Raceway line + a small data/serial marking
  ctx.strokeStyle = 'rgba(70,74,84,0.6)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(hw * 0.25, topY + h * 0.14); ctx.lineTo(hw * 0.25, botY); ctx.stroke();
  ctx.fillStyle = 'rgba(44,48,60,0.5)';
  ctx.fillRect(-hw * 0.2, topY + h * 0.19, w * 0.06, h * 0.14);
  ctx.restore();

  // Body outline
  ctx.strokeStyle = '#383c46'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(-hw, topY, w, h, r); ctx.stroke();

  // ── Engine nozzle skirt at the base ──
  ctx.fillStyle = '#2a2a32';
  ctx.beginPath();
  ctx.moveTo(-hw * 0.72, botY - h * 0.02);
  ctx.lineTo( hw * 0.72, botY - h * 0.02);
  ctx.lineTo( hw * 0.5,  botY + h * 0.03);
  ctx.lineTo(-hw * 0.5,  botY + h * 0.03);
  ctx.closePath(); ctx.fill();

  // ── Grid fins near the top (project out beyond the body) ──
  function gridFin(side) {
    const fy = topY + h * 0.155, fht = h * 0.085, fwd = w * 0.5;
    const x0 = side > 0 ? hw : -hw - fwd;
    ctx.fillStyle = '#565a64';
    ctx.fillRect(x0, fy, fwd, fht);
    ctx.strokeStyle = '#202026'; ctx.lineWidth = 0.8; ctx.strokeRect(x0, fy, fwd, fht);
    ctx.strokeStyle = 'rgba(22,22,28,0.7)'; ctx.lineWidth = 0.6;  // lattice
    for (let i = 1; i < 3; i++) { const lx = x0 + fwd * i / 3; ctx.beginPath(); ctx.moveTo(lx, fy); ctx.lineTo(lx, fy + fht); ctx.stroke(); }
    const ly = fy + fht / 2; ctx.beginPath(); ctx.moveTo(x0, ly); ctx.lineTo(x0 + fwd, ly); ctx.stroke();
  }
  gridFin(-1); gridFin(1);

  ctx.restore();
}

function drawPanel(d) {
  ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.angle);
  const hw = d.w / 2, hh = d.h / 2;

  // Layout: [left panel] — boom — [body] — boom — [right panel]
  const bodyW = d.h * 1.1;   // roughly square body
  const bodyH = d.h * 1.4;   // a bit taller than panel height
  const gap   = 4;            // gap between panel edge and body
  const panW  = hw - bodyW / 2 - gap;
  const panH  = d.h * 0.82;

  // Solar panels (draw first, body covers the overlap)
  for (const sx of [-(bodyW / 2 + gap + panW / 2), (bodyW / 2 + gap + panW / 2)]) {
    // Panel fill
    ctx.fillStyle = '#1a2a8a';
    ctx.fillRect(sx - panW / 2, -panH / 2, panW, panH);
    // Grid lines (3 cols × 1 row divider)
    ctx.strokeStyle = '#2a4ab8'; ctx.lineWidth = 0.7;
    for (let i = 1; i < 3; i++) {
      const lx = sx - panW / 2 + (panW / 3) * i;
      ctx.beginPath(); ctx.moveTo(lx, -panH / 2); ctx.lineTo(lx, panH / 2); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(sx - panW / 2, 0); ctx.lineTo(sx + panW / 2, 0); ctx.stroke();
    // Sheen
    ctx.fillStyle = 'rgba(120,170,255,0.14)';
    ctx.fillRect(sx - panW / 2, -panH / 2, panW * 0.38, panH);
    // Border
    ctx.strokeStyle = '#4a6aaa'; ctx.lineWidth = 1;
    ctx.strokeRect(sx - panW / 2, -panH / 2, panW, panH);
  }

  // Booms connecting panels to body
  ctx.strokeStyle = '#9098a0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-bodyW / 2, 0); ctx.lineTo(-(bodyW / 2 + gap), 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( bodyW / 2, 0); ctx.lineTo(  bodyW / 2 + gap,  0); ctx.stroke();

  // Main satellite body
  ctx.fillStyle = '#8890a0';
  ctx.fillRect(-bodyW / 2, -bodyH / 2, bodyW, bodyH);
  // Instrument bay (dark top band)
  ctx.fillStyle = '#383e4e';
  ctx.fillRect(-bodyW / 2 + 2, -bodyH / 2 + 2, bodyW - 4, bodyH * 0.28);
  // Aperture / sensor lens
  ctx.fillStyle = 'rgba(60,130,235,0.72)';
  ctx.beginPath(); ctx.arc(0, bodyH * 0.10, bodyW * 0.28, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#5068a8'; ctx.lineWidth = 0.8; ctx.stroke();
  // Body border
  ctx.strokeStyle = '#5c6472'; ctx.lineWidth = 1;
  ctx.strokeRect(-bodyW / 2, -bodyH / 2, bodyW, bodyH);

  // Antenna stub on top
  ctx.strokeStyle = '#b0bac4'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(bodyW * 0.18, -bodyH / 2); ctx.lineTo(bodyW * 0.18, -bodyH / 2 - 9); ctx.stroke();
  ctx.fillStyle = '#c8d0d8';
  ctx.beginPath(); ctx.arc(bodyW * 0.18, -bodyH / 2 - 10.5, 2.2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// Cartoon astronaut matching icon/astronaut.png: bold outline, white suit,
// big round helmet with a warm dark visor, one arm raised, chest control panel.
function drawAstronaut(d) {
  ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.angle);
  const sc = d.h / 64;
  ctx.scale(sc, sc);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  const OUT  = '#16161e';   // bold cartoon outline
  const suit = '#eef1f6';

  function capsule(x1, y1, x2, y2, thick) {   // outlined limb segment
    ctx.strokeStyle = OUT;  ctx.lineWidth = thick + 3;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.strokeStyle = suit; ctx.lineWidth = thick;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
  function ball(x, y, rr) {                    // outlined white ball (glove/boot)
    ctx.fillStyle = suit; ctx.strokeStyle = OUT; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(x, y, rr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }

  // Limbs (behind the torso): left arm out, right arm raised waving; legs splayed
  capsule(-8, 4, -20, 11, 7);   ball(-21, 12, 4.5);   // left arm + glove
  capsule( 8, 2,  21, -10, 7);  ball( 22, -11, 4.5);  // right arm raised + glove
  capsule(-6, 17, -8, 29, 8);   ball(-8, 30, 5);      // left leg + boot
  capsule( 6, 17,  9, 29, 8);   ball( 9, 30, 5);      // right leg + boot

  // Torso
  ctx.fillStyle = suit; ctx.strokeStyle = OUT; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(-11, -2, 22, 23, 9); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(150,160,180,0.30)';            // soft side shading
  ctx.beginPath(); ctx.roundRect(2, 0, 7, 19, 5); ctx.fill();

  // Chest control panel — dark square + orange button (as in the png)
  ctx.fillStyle = '#33384a'; ctx.strokeStyle = OUT; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(-5, 4, 7, 7, 1.5); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#f3911f';
  ctx.beginPath(); ctx.arc(5, 7, 2.3, 0, Math.PI * 2); ctx.fill();

  // Helmet
  ctx.fillStyle = suit; ctx.strokeStyle = OUT; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0, -15, 14, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Big warm dark visor
  ctx.fillStyle = '#2c2016'; ctx.strokeStyle = OUT; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(0, -14.5, 10, 11, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Visor sheen
  ctx.fillStyle = 'rgba(130,160,200,0.55)';
  ctx.beginPath(); ctx.ellipse(-4, -19, 3.4, 2.2, -0.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.32)';
  ctx.beginPath(); ctx.ellipse(4.5, -11, 1.8, 3, 0.3, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// Comet matching icon/comet.png: a rough dark rocky nucleus trailing a broad,
// feathery, bright cyan→blue tail. Tail streams in +x; nucleus leads at the origin.
function drawComet(d) {
  ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.angle);
  const r = d.w / 2;
  const tailLen = r * 8;

  // ── Broad feathery tail: several overlapping plumes, wispiest outermost ──
  const plumes = [
    { spread: r * 1.7, len: tailLen * 0.95, a: 0.16, col: '120,210,255' },
    { spread: r * 1.1, len: tailLen * 1.00, a: 0.22, col: '150,225,255' },
    { spread: r * 0.55,len: tailLen * 0.80, a: 0.50, col: '210,245,255' },
  ];
  for (const p of plumes) {
    const g = ctx.createLinearGradient(r * 0.4, 0, r + p.len, 0);
    g.addColorStop(0,   `rgba(${p.col},${p.a})`);
    g.addColorStop(0.5, `rgba(${p.col},${p.a * 0.5})`);
    g.addColorStop(1,   `rgba(${p.col},0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(r * 0.4, -p.spread * 0.35);
    ctx.quadraticCurveTo(r + p.len * 0.5, -p.spread, r + p.len, 0);
    ctx.quadraticCurveTo(r + p.len * 0.5,  p.spread, r * 0.4, p.spread * 0.35);
    ctx.closePath(); ctx.fill();
  }
  // Bright white-cyan core streak
  const cg = ctx.createLinearGradient(r * 0.3, 0, r + tailLen * 0.7, 0);
  cg.addColorStop(0,   'rgba(240,252,255,0.95)');
  cg.addColorStop(0.4, 'rgba(170,230,255,0.55)');
  cg.addColorStop(1,   'rgba(120,200,255,0)');
  ctx.strokeStyle = cg; ctx.lineWidth = r * 0.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(r * 0.3, 0); ctx.lineTo(r + tailLen * 0.7, 0); ctx.stroke();

  // ── Glowing coma hugging the nucleus ──
  const coma = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 2.2);
  coma.addColorStop(0,   'rgba(200,240,255,0.70)');
  coma.addColorStop(0.5, 'rgba(120,200,255,0.22)');
  coma.addColorStop(1,   'rgba(80,160,255,0)');
  ctx.fillStyle = coma;
  ctx.beginPath(); ctx.arc(0, 0, r * 2.2, 0, Math.PI * 2); ctx.fill();

  // ── Rough dark rocky nucleus (irregular, cratered) ──
  ctx.save();
  ctx.beginPath();
  const verts = 10;
  for (let i = 0; i < verts; i++) {
    const a  = (i / verts) * Math.PI * 2;
    const rr = r * (0.78 + ((i * 41) % 7) / 7 * 0.34);   // deterministic jagged radius
    const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.clip();
  const ng = ctx.createRadialGradient(-r * 0.25, -r * 0.25, r * 0.1, 0, 0, r * 1.2);
  ng.addColorStop(0,   '#6b6f78');
  ng.addColorStop(0.6, '#3b3d44');
  ng.addColorStop(1,   '#1c1d22');
  ctx.fillStyle = ng;
  ctx.fillRect(-r * 1.3, -r * 1.3, r * 2.6, r * 2.6);
  ctx.fillStyle = 'rgba(0,0,0,0.32)';                     // craters
  ctx.beginPath(); ctx.arc(-r * 0.2, r * 0.15, r * 0.26, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( r * 0.3, -r * 0.25, r * 0.16, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.12)';               // dusty highlight
  ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.3, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // Sunlit rim glow toward the tail
  ctx.strokeStyle = 'rgba(180,225,255,0.5)'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.95, -0.6, 1.0); ctx.stroke();

  ctx.restore();
}

function drawColumn(d) {
  const hw = d.w / 2;
  ctx.save();

  function drawSeg(y, h, capSide) {
    if (h <= 0) return;
    // Body — dark space-rock gradient
    const g = ctx.createLinearGradient(d.x - hw, 0, d.x + hw, 0);
    g.addColorStop(0,   '#18182a');
    g.addColorStop(0.3, '#383558');
    g.addColorStop(0.7, '#302e50');
    g.addColorStop(1,   '#14131f');
    ctx.fillStyle = g;
    ctx.fillRect(d.x - hw, y, d.w, h);

    // Left highlight / right shadow
    ctx.fillStyle = 'rgba(120,110,180,0.22)';
    ctx.fillRect(d.x - hw, y, 5, h);
    ctx.fillStyle = 'rgba(0,0,0,0.38)';
    ctx.fillRect(d.x + hw - 5, y, 5, h);

    // Horizontal strata lines
    ctx.strokeStyle = 'rgba(90,82,130,0.38)';
    ctx.lineWidth = 1;
    for (let by = y + 22; by < y + h; by += 26) {
      ctx.beginPath(); ctx.moveTo(d.x - hw, by); ctx.lineTo(d.x + hw, by); ctx.stroke();
    }

    // Cap edge (the face pointing into the gap)
    const capY = capSide === 'bottom' ? y + h - 9 : y;
    ctx.fillStyle = '#5e5c88';
    ctx.fillRect(d.x - hw, capY, d.w, 9);
    ctx.fillStyle = 'rgba(190,182,255,0.42)';
    ctx.fillRect(d.x - hw, capSide === 'bottom' ? capY : capY + 7, d.w, 2);
  }

  drawSeg(0, d.gapY, 'bottom');
  const botY = d.gapY + d.gap;
  drawSeg(botY, H - GROUND_H - botY, 'top');
  ctx.restore();
}

function drawTV(x, y, angle) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle);

  // Static drop shadow (offset lower-right, softened) for depth
  ctx.save();
  ctx.filter = 'blur(4px)';
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(-46 + 6, -32 + 6, 91, 63);
  ctx.restore();

  // Outer bezel (91 × 63)
  ctx.fillStyle = '#111120';
  ctx.fillRect(-46, -32, 91, 63);
  ctx.strokeStyle = '#383850'; ctx.lineWidth = 3.5;
  ctx.strokeRect(-46, -32, 91, 63);

  // Screen background
  ctx.fillStyle = '#040810';
  ctx.fillRect(-39, -25, 77, 46);

  // Colour bars (broadcast test-card style)
  const bars = ['#c8b818', '#18c0a0', '#1868e0', '#9018b8', '#d04020', '#28a840', '#c8b818'];
  const bw = 77 / bars.length;
  bars.forEach((c, i) => {
    ctx.fillStyle = c; ctx.fillRect(-39 + i * bw, -25, bw, 30);
  });

  // Dark lower panel
  ctx.fillStyle = '#03060e';
  ctx.fillRect(-39, 5, 77, 16);

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  for (let ly = -25; ly < 21; ly += 5) ctx.fillRect(-39, ly, 77, 1.5);

  // Screen glow border
  ctx.strokeStyle = 'rgba(70,140,255,0.65)'; ctx.lineWidth = 2;
  ctx.strokeRect(-39, -25, 77, 46);

  // Power LED bottom-right of bezel
  ctx.fillStyle = '#00ff80';
  ctx.beginPath(); ctx.arc(36, 24, 3.5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// Wall-mounted rotating laser turret: a small dome with a red emitter and a
// glowing red beam that sweeps around (lethal to the telescope on contact).
function drawLaser(mx, my, angle, len, x0, x1) {
  if (mx + len < x0 || mx - len > x1) return;
  const tx = mx + Math.cos(angle) * len, ty = my + Math.sin(angle) * len;
  ctx.save();
  ctx.lineCap = 'round';
  // Beam: soft outer glow + bright core
  const beam = ctx.createLinearGradient(mx, my, tx, ty);
  beam.addColorStop(0, 'rgba(255,90,70,0.95)');
  beam.addColorStop(1, 'rgba(255,40,40,0.20)');
  ctx.strokeStyle = 'rgba(255,40,40,0.22)'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(tx, ty); ctx.stroke();
  ctx.strokeStyle = beam; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(tx, ty); ctx.stroke();
  // Bright tip
  ctx.fillStyle = 'rgba(255,210,190,0.9)';
  ctx.beginPath(); ctx.arc(tx, ty, 2.6, 0, Math.PI * 2); ctx.fill();
  // Turret base mounted on the wall
  ctx.fillStyle = '#3a3e48'; ctx.strokeStyle = '#20242c'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(mx, my, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Glowing red emitter
  ctx.shadowColor = 'rgba(255,60,40,0.9)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#e8281c';
  ctx.beginPath(); ctx.arc(mx, my, 3.8, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}
